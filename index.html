// ── SVG CHARTS WITH TOOLTIPS ─────────────────────────────────────────────────
function Bars({data,keys,colors,h=160,fmtY}){
  const [tip,setTip]=useState(null);
  const W=500,H=h,PL=42,PB=22,PT=8,PR=6,cW=W-PL-PR,cH=H-PB-PT;
  const maxV=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)),1);
  const slotW=cW/data.length,bW=Math.max(6,slotW*(keys.length===1?0.55:0.38));
  const totalBW=bW*keys.length+(keys.length-1)*2;
  const fY=fmtY||(v=>v>=1000?num(Math.round(v/1000))+"k":num(Math.round(v)));
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-30}}>{tip.label}: {tip.val}</div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}} onMouseLeave={()=>setTip(null)}>
      {[0,.25,.5,.75,1].map(r=>{const y=PT+cH*(1-r);return <g key={r}><line x1={PL} x2={W-PR} y1={y} y2={y} stroke={"var(--chart-grid)"} strokeWidth={0.5}/><text x={PL-3} y={y+4} textAnchor="end" fill={MUT} fontSize={9}>{fY(maxV*r)}</text></g>;})}
      {data.map((d,di)=>{
        const sX=PL+di*slotW,bSX=sX+(slotW-totalBW)/2;
        return <g key={di}>
          {keys.map((k,ki)=>{const val=d[k]||0;const bH=Math.max(2,(val/maxV)*cH);const x=bSX+ki*(bW+2);const y=PT+cH-bH;
            return <rect key={ki} x={x} y={y} width={bW} height={bH} fill={colors[ki]||GOLD_F} rx={2}
              onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,label:k,val:eur(val)})}
              style={{cursor:"crosshair"}}/>;
          })}
          <text x={sX+slotW/2} y={H-5} textAnchor="middle" fill={MUT} fontSize={9}>{d.lbl}</text>
        </g>;
      })}
    </svg>
  </div>;
}

function Donut({data,sz=110}){
  const [tip,setTip]=useState(null);
  const total=data.reduce((s,d)=>s+d.v,0)||1,cx=sz/2,cy=sz/2,r=sz*0.37,ri=sz*0.22;
  let a=-Math.PI/2;
  const slices=data.map(d=>{
    const sw=(d.v/total)*2*Math.PI,x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a+sw),y2=cy+r*Math.sin(a+sw);
    const xi1=cx+ri*Math.cos(a),yi1=cy+ri*Math.sin(a),xi2=cx+ri*Math.cos(a+sw),yi2=cy+ri*Math.sin(a+sw);
    const lg=sw>Math.PI?1:0,path=`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1} Z`;
    a+=sw;return{path,fill:d.col,n:d.n,v:d.v};
  });
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-30}}>{tip.n}: {eur(tip.v)}</div>}
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`} onMouseLeave={()=>setTip(null)}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.fill} style={{cursor:"crosshair"}} onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,n:s.n,v:s.v})}/>)}
    </svg>
  </div>;
}


function LineChart({data,keys,colors,h}){
  h=h||160;
  const [tip,setTip]=useState(null);
  const W=500,H=h,PL=48,PB=22,PT=8,PR=8,cW=W-PL-PR,cH=H-PB-PT;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max.apply(null,allV.concat([1]));
  const xS=cW/(Math.max(data.length-1,1));
  const px=function(i){return PL+i*xS;};
  const py=function(v){return PT+cH*(1-v/maxV);};
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-30}}>{tip.lbl}: {eur(tip.v)}</div>}
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:H}} onMouseLeave={()=>setTip(null)}>
      {[0,.25,.5,.75,1].map(function(r){var y=PT+cH*(1-r);return <g key={r}><line x1={PL} x2={W-PR} y1={y} y2={y} stroke="var(--chart-grid)" strokeWidth={0.5}/><text x={PL-3} y={y+4} textAnchor="end" fill="#7a8fa6" fontSize={9}>{y>=1000?num(Math.round(y/1000))+"k":num(Math.round(maxV*r))}</text></g>;})}
      {keys.map(function(k,ki){
        var pts=data.map(function(d,i){return {x:px(i),y:py(d[k]||0),v:d[k]||0,l:d.lbl};});
        var path="M"+pts.map(function(p){return p.x+","+p.y;}).join(" L");
        return <g key={k}>
          <path d={path} fill="none" stroke={colors[ki]||GOLD_F} strokeWidth={2} strokeLinejoin="round"/>
          {pts.map(function(p,i){return <circle key={i} cx={p.x} cy={p.y} r={3.5} fill={colors[ki]||GOLD_F} style={{cursor:"crosshair"}} onMouseEnter={function(e){setTip({x:e.clientX,y:e.clientY,lbl:k+" "+p.l,v:p.v});}}/>;})}
        </g>;
      })}
      {data.map(function(d,i){return <text key={i} x={px(i)} y={H-5} textAnchor="middle" fill="#7a8fa6" fontSize={9}>{d.lbl}</text>;})}
    </svg>
  </div>;
}

function Gauge({sc,col}){

// RevPAR denominator helpers (same logic as ocupación)
function ingIsLeap(y){return (y%4===0&&y%100!==0)||y%400===0;}
function ingFirstDate(prop){
  var src=[];try{src=JSON.parse(localStorage.getItem("pt_bk_cache"))||[];}catch(e){}
  const rows=src.filter(b=>(prop==="all"||b[0]===prop)&&b[4]);
  if(!rows.length) return null;
  return rows.map(b=>b[4]).sort()[0];
}
function ingDenomYr(prop,yr){
  const fd=ingFirstDate(prop);
  if(!fd) return ingIsLeap(yr)?366:365;
  const first=new Date(fd);
  if(first.getFullYear()===yr){
    const dec31=new Date(yr,11,31);
    return Math.round((dec31-first)/86400000)+1;
  }
  return ingIsLeap(yr)?366:365;
}

// ── TAB: MI INVERSIÓN ────────────────────────────────────────────────────────
function TabMiInversion({activeBK,ingData,ex}){
  const isLive=activeBK.length>0&&activeBK[0].length>11;
  const availP=[...new Set(activeBK.map(b=>b[0]))].sort((a,b)=>({LV:0,EL:1}[a]??99)-({LV:0,EL:1}[b]??99));

  function getYears(p){
    return[...new Set(activeBK.filter(b=>b[0]===p).map(b=>b[9]))].sort((a,b)=>a-b);
  }

  function getRow(p,yr){
    const bks=activeBK.filter(b=>b[0]===p&&(yr==="all"||b[9]===+yr));
    if(!bks.length)return null;
    let colU,rot;
    if(isLive){
      rot=bks.reduce((s,b)=>s+(b[13]||0),0);
      colU=bks.reduce((s,b)=>s+(b[8]||0),0)+rot;
    }else{
      rot=0;
      colU=bks.reduce((s,b)=>s+b[8],0);
    }
    const gasFijos=fixedTot(p,yr==="all"?"all":+yr,ex);
    const hasGas=gasFijos>0||rot>0;
    const totalGas=hasGas?rot+gasFijos:null;
    const benef=hasGas?colU-totalGas:null;
    const rent=(hasGas&&PRICE[p]>0)?(benef/PRICE[p]*100):null;
    const margen=(hasGas&&colU>0)?(benef/colU*100):null;
    return{colU,rot,gasFijos,totalGas,benef,rent,margen,hasGas};
  }

  const CW="9% 16% 16% 15% 14% 14% 12%";

  function Hdr({txt,desc,right}){
    return<div style={{textAlign:right?"right":"left"}}>
      <div style={{fontSize:9.5,color:MUT,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,lineHeight:1.3}}>{txt}</div>
      {desc&&<div style={{fontSize:8.5,color:MUT,opacity:0.6,lineHeight:1.3,marginTop:2}}>{desc}</div>}
    </div>;
  }

  function Cell({v,col,bold}){
    return<div style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.02em",fontSize:bold?13:12,fontWeight:bold?600:400,color:col||TXT,textAlign:"right",lineHeight:1}}>{v}</div>;
  }

  function PropTable({p}){
    const pName=p==="LV"?"Las Vegas Golf":p==="EL"?"Los Elefantes":p;
    const pCol=p==="LV"?GOLD:TEAL;
    const years=getYears(p);
    const tot=getRow(p,"all");

    function Row({yr,isTotal}){
      const d=isTotal?tot:getRow(p,+yr);
      if(!d)return null;
      const gCompra=isTotal?PRICE[p]:null;
      return<div style={{display:"grid",gridTemplateColumns:CW,gap:6,padding:isTotal?"13px 16px":"10px 16px",borderBottom:`1px solid ${BD}`,background:isTotal?"var(--sec)":"transparent",alignItems:"center",minWidth:600}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:isTotal?700:400,color:isTotal?pCol:MUT,letterSpacing:isTotal?"0.04em":"normal"}}>{isTotal?"TOTAL":yr}</div>
        <Cell v={d.colU>0?eur(d.colU):"—"} col={TXT} bold={isTotal}/>
        <Cell v={d.totalGas!=null?eur(d.totalGas):"—"} col={d.totalGas!=null?RED:MUT} bold={isTotal}/>
        <Cell v={d.benef!=null?eur(d.benef):"—"} col={d.benef!=null?(d.benef>=0?GRN:RED):MUT} bold={isTotal}/>
        <Cell v={gCompra?eur(gCompra):"—"} col={gCompra?GOLD:MUT} bold={isTotal}/>
        <Cell v={d.rent!=null?pct(d.rent):"—"} col={d.rent!=null?(d.rent>=0?GRN:RED):MUT} bold={isTotal}/>
        <Cell v={d.margen!=null?pct(d.margen)+"":"—"} col={d.margen!=null?(d.margen>=20?GRN:d.margen>=0?GOLD:RED):MUT} bold={isTotal}/>
      </div>;
    }

    return<div style={{background:CARD,border:`1px solid ${BD}`,borderRadius:11,overflow:"hidden",marginBottom:14}}>
      {/* Cabecera propiedad */}
      <div style={{padding:"14px 16px",background:"var(--sec)",borderBottom:`1px solid ${BD}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:pCol,lineHeight:1.2}}>{pName}</div>
          <div style={{fontSize:11,color:MUT,marginTop:3}}>{p==="LV"?"Maspalomas · desde dic. 2021 · 4,5 años activa":"Maspalomas · desde ago. 2024 · 1,7 años activa"}</div>
        </div>
        {tot&&tot.rent!=null&&<div style={{textAlign:"right"}}>
          <div style={{fontSize:9.5,color:MUT,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3}}>Rentabilidad acumulada</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:500,color:tot.rent>=0?GRN:RED,letterSpacing:"-.03em"}}>{pct(tot.rent)}</div>
        </div>}
      </div>
      {/* Tabla con scroll horizontal en móvil */}
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {/* Cabecera columnas */}
        <div style={{display:"grid",gridTemplateColumns:CW,gap:6,padding:"9px 16px",background:"var(--sec)",borderBottom:`1px solid ${BD}`,minWidth:600}}>
          <Hdr txt="Año" right={false}/>
          <Hdr txt="Ingresos Brutos" desc="Ingreso plataformas" right={true}/>
          <Hdr txt="Total Gastos" desc="Rotación + fijos" right={true}/>
          <Hdr txt="Beneficio Neto" desc="Ingresos − Gastos" right={true}/>
          <Hdr txt="Precio Compra" desc="Solo fila total" right={true}/>
          <Hdr txt="Rentabilidad" desc="Beneficio / Compra" right={true}/>
          <Hdr txt="Margen" desc="Beneficio / Ingresos" right={true}/>
        </div>
        {/* Fila TOTAL */}
        <Row yr="all" isTotal={true}/>
        {/* Filas por año */}
        {years.map(yr=><Row key={yr} yr={yr} isTotal={false}/>)}
      </div>
    </div>;
  }

  return<div>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"var(--brand)",marginBottom:4,lineHeight:1.2,letterSpacing:"-.02em"}}>Mi Inversión</div>
    <div style={{fontSize:12,color:MUT,marginBottom:16}}>Rentabilidad acumulada y anual por propiedad</div>
    {availP.map(p=><PropTable key={p} p={p}/>)}
  </div>;
}


// ── INSIGHTS ENGINE ──────────────────────────────────────────────────────────
function computeInsights(activeBK, prop) {
  const insights = [];
  const lvBk = activeBK.filter(b => b[0] === "LV");
  const elBk = activeBK.filter(b => b[0] === "EL");
  const selBk = prop === "all" ? activeBK : activeBK.filter(b => b[0] === prop);

  // Tendencia año a año
  const lv25 = lvBk.filter(b => b[9] === 2025).reduce((s,b) => s+b[6], 0);
  const lv24 = lvBk.filter(b => b[9] === 2024).reduce((s,b) => s+b[6], 0);
  if (lv24 > 0) {
    const d = Math.round((lv25-lv24)/lv24*100);
    if (Math.abs(d) > 5) insights.push({type: d>0?"green":"red", txt: `Las Vegas tuvo un ${d>0?"+":""}${d}% de noches en 2025 vs 2024.`});
  }
  // Dependencia de plataforma
  const bkPct = selBk.length ? selBk.filter(b=>b[1]==="B").length/selBk.length*100 : 0;
  if (bkPct > 70) insights.push({type:"red", txt:`Dependencia alta de Booking (${bkPct.toFixed(0)}%). Diversificar puede reducir comisiones.`});
  // Estancia media
  const avgA = selBk.reduce((s,b)=>s+b[6],0)/(selBk.length||1);
  if (avgA > 10) insights.push({type:"green", txt:`Estancia media de ${avgA.toFixed(1)} noches. Rotación muy eficiente.`});
  // Payback
  const lvPb = roi_simple("LV", activeBK);
  const elPb = roi_simple("EL", activeBK);
  if (lvPb < 10) insights.push({type:"gold", txt:`Las Vegas recuperará la inversión en ~${lvPb.toFixed(0)} años al ritmo actual.`});
  if (elPb < 15 && elPb > 0) insights.push({type:"gold", txt:`Los Elefantes: payback estimado ~${elPb.toFixed(0)} años. Excelente para <2 años activa.`});
  // LV vs EL ADR
  const lvADR = lvBk.reduce((s,b)=>s+b[8],0)/(lvBk.reduce((s,b)=>s+b[6],0)||1);
  const elADR = elBk.reduce((s,b)=>s+b[8],0)/(elBk.reduce((s,b)=>s+b[6],0)||1);
  if (lvADR>0 && elADR>0) insights.push({type:"blue", txt:`ADR Las Vegas (${eur(Math.round(lvADR))}/n) ${lvADR>elADR?"supera":"está por debajo de"} Los Elefantes (${eur(Math.round(elADR))}/n).`});
  return insights.slice(0,5);
}
function roi_simple(p, bkData) {
  const bk = (bkData||BK).filter(b=>b[0]===p);
  const ben = EXCEL_TOTALS[p].beneficio;
  const yrs = p==="LV"?4.5:1.75;
  const annB = ben/yrs;
  return annB>0 ? Math.max(0,(PRICE[p]-ben)/annB) : 99;
}
function InsightsPanel({activeBK, prop}) {
  const ins = useMemo(() => computeInsights(activeBK, prop), [activeBK, prop]);
  if (!ins.length) return null;

}

// ── TAB: MI PATRIMONIO ────────────────────────────────────────────────────────
function TabInv({prop, ex, activeBK, onSelectProp, onGoToInversion}) {
  const isLive = activeBK.length>0&&activeBK[0].length>11;
  // b[8]=col Y (neto tras comis+rot), b[13]=rotación Eka, col U=lo que ingresa en cuenta
  const lvNeto = activeBK.filter(b=>b[0]==="LV").reduce((s,b)=>s+b[8],0);
  const elNeto = activeBK.filter(b=>b[0]==="EL").reduce((s,b)=>s+b[8],0);
  const lvRot  = isLive ? activeBK.filter(b=>b[0]==="LV").reduce((s,b)=>s+(b[13]||0),0) : 0;
  const elRot  = isLive ? activeBK.filter(b=>b[0]==="EL").reduce((s,b)=>s+(b[13]||0),0) : 0;
  const lvColU = lvNeto + lvRot;
  const elColU = elNeto + elRot;
  const lvYrs=4.5, elYrs=1.75;
  const lvGasFijos = fixedTot("LV","all",[]);
  const elGasFijos = fixedTot("EL","all",[]);
  const lvGastos = lvRot + lvGasFijos;
  const elGastos = elRot + elGasFijos;
  const lvBen = lvNeto - lvGasFijos;
  const elBen = elNeto - elGasFijos;

  const totalInv    = PRICE.LV + PRICE.EL;
  const totalGastos = lvGastos + elGastos;
  const totalBen    = lvBen + elBen;
  const totalRecup  = Math.max(0, totalBen / totalInv * 100);

  // Score 1-10 per brief formula (weighted average)
  function calcScore10(p) {
    const ben = EXCEL_TOTALS[p].beneficio;
    const inc = p==="LV" ? lvColU : elColU;
    const nights = activeBK.filter(b=>b[0]===p).reduce((s,b)=>s+b[6],0);
    const yrs = p==="LV" ? lvYrs : elYrs;
    const roiA = (ben/PRICE[p]*100)/yrs;           // annual net return %
    const recupVel = (ben/PRICE[p]*100)/yrs;       // % recovered / years
    const ocu = Math.min(100, nights/avail(p,"all")*100);
    const adr = nights>0 ? inc/nights : 0;
    // Normalize to 1–10 with calibrated reference ceilings
    const s1 = Math.min(10, Math.max(1, 1+(roiA/5)*9));        // 35% — ROI ceil 5%/yr
    const s2 = Math.min(10, Math.max(1, 1+(recupVel/4)*9));    // 30% — recup ceil 4%/yr
    const s3 = Math.min(10, Math.max(1, 1+(ocu/70)*9));        // 20% — ocu ceil 70%
    const s4 = Math.min(10, Math.max(1, 1+(adr/120)*9));       // 15% — ADR ceil 120€
    return Math.round((s1*0.35 + s2*0.30 + s3*0.20 + s4*0.15)*10)/10;
  }
  const lvScore10 = calcScore10("LV");
  const elScore10 = calcScore10("EL");

  // Estimated recovery year
  function recoveryYear(p) {
    const ben = EXCEL_TOTALS[p].beneficio;
    const yrs = p==="LV" ? lvYrs : elYrs;
    const annB = ben/yrs;
    if (annB<=0) return "N/D";
    const remaining = PRICE[p]-ben;
    if (remaining<=0) return "Recuperado";
    return String(Math.round(TODAY.getFullYear() + remaining/annB));
  }

  // Property card component
  function PropCard({p, inc, color}) {
    const desde = p==="LV"?"dic. 2021":"ago. 2024";
    const yrsLbl = p==="LV"?"4,5 años":"1,7 años";
    const yrsN = p==="LV" ? lvYrs : elYrs;
    const gastos = p==="LV" ? lvGastos : elGastos;
    const beneficio = p==="LV" ? lvBen : elBen;
    const recup = Math.max(0, beneficio/PRICE[p]*100);
    const recYear = recoveryYear(p);
    const score10 = p==="LV" ? lvScore10 : elScore10;
    const [hov,setHov] = useState(false);

    return <div
      onClick={()=>onGoToInversion&&onGoToInversion()}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        background:CARD,
        border:`1px solid ${hov?"var(--brand)":BD}`,
        borderRadius:12, padding:"18px 20px",
        cursor:"pointer",
        boxShadow:hov?"0 0 0 1px var(--brand)33":"none",
        transition:"border-color .2s,box-shadow .2s",
      }}>

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:p==="LV"?GOLD:TEAL,lineHeight:1.2,letterSpacing:"-.01em"}}>
            {p==="LV"?"Las Vegas Golf":"Los Elefantes"}
          </div>
          <div style={{fontSize:11,color:MUT,marginTop:4}}>Maspalomas · desde {desde} · {yrsLbl} activa</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0,marginLeft:20}}>
          <div style={{display:"flex",alignItems:"baseline",gap:4,justifyContent:"flex-end"}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:500,color:GRN,letterSpacing:"-.04em",lineHeight:1}}>{score10}</span>
            <span style={{fontSize:14,color:MUT,fontWeight:400}}>/10</span>
          </div>
          <div style={{fontSize:10,color:MUT,marginTop:3}}>basado en {yrsLbl} de datos</div>
        </div>
      </div>

      {/* Separator */}
      <div style={{height:1,background:BD,margin:"12px 0"}}/>

      {/* METRICS — 5 columns */}
      <div className="prop-card-metrics">
        {[
          ["PRECIO COMPRA",        eur(PRICE[p]),   TXT,  null],
          ["INGRESOS RECIBIDOS",   eur(p==="LV"?lvColU:elColU), TXT, null],
          ["GASTOS ACUM.",         eur(gastos),      RED,  null],
          ["BENEFICIO REAL",       eur(beneficio),   GRN,  PRICE[p]>0 ? pct(beneficio/PRICE[p]*100)+" sobre inversión" : null],
          ["RECUPERACIÓN EST.", recYear,          GOLD, null],
        ].map(([l,v,cl,pctVal]) => (
          <div key={l}>
            <div style={{fontSize:9,color:MUT,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5,lineHeight:1.4}}>{l}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:15,fontWeight:500,color:cl,lineHeight:1}}>{v}</div>
            {pctVal && <div style={{fontSize:10,color:cl,marginTop:3,fontFamily:"'DM Mono',monospace"}}>({pctVal})</div>}
          </div>
        ))}
      </div>

      {/* RECOVERY BAR */}
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{fontSize:11,color:MUT,whiteSpace:"nowrap",minWidth:120}}>Inversión recuperada</div>
        <div style={{flex:1,minWidth:80,background:BD,borderRadius:4,height:4,overflow:"hidden"}}>
          <div style={{width:Math.min(100,recup)+"%",height:"100%",background:color,borderRadius:4,transition:"width .7s ease"}}/>
        </div>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,color:GOLD,whiteSpace:"nowrap"}}>{pct(recup)}</div>
      </div>
    </div>;
  }

  return <div>
    {/* TÍTULO */}
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"var(--brand)",marginBottom:16,lineHeight:1.2,letterSpacing:"-.02em"}}>
      Mi Patrimonio
    </div>

    {/* MAPA MUNDO */}
    <PropMap />

    {/* KPIs GLOBALES */}
    <div className="kpi-global">
      {[
        {lbl:"TOTAL INVERTIDO",    val:eur(totalInv),      col:TXT},
        {lbl:"INGRESOS RECIBIDOS",   val:eur(lvColU+elColU),  col:"var(--brand)"},
        {lbl:"TOTAL GASTOS ACUM.", val:eur(totalGastos),   col:RED},
        {lbl:"BENEFICIO REAL",     val:eur(totalBen),      col:GRN},
        {lbl:"RECUPERADO",         val:pct(totalRecup),    col:GOLD},
      ].map(k => (
        <div key={k.lbl} style={{background:CARD,border:"1px solid "+BD,borderRadius:11,padding:"13px 15px"}}>
          <div style={{fontSize:9.5,color:MUT,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:7}}>{k.lbl}</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22,fontWeight:500,color:k.col,lineHeight:1}}>{k.val}</div>
        </div>
      ))}
    </div>

    {/* TARJETAS POR PROPIEDAD — una por fila */}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <PropCard p="LV" inc={lvColU} color={GOLD_F}/>
      <PropCard p="EL" inc={elColU} color={TEAL_F}/>
    </div>
  </div>;
}

// Derive ING_DATA from live BK:
// r[0]=prop, r[1]=ci, r[2]=co, r[3]=platName, r[4]=noches, r[5]=pax,
// r[6]=netY(col Y - main income), r[7]=netU(col U), r[8]=bruto(col Q), r[9]=ADR, r[10]=epn, r[11]=year, r[12]=mes
function makeIngData(bkArr){
  return (bkArr||[]).map(b=>{
    const colU=b[17]||b[8]||0; // col U (fallback col Y)
    const nch=b[6]||0, pax=b[7]||1;
    return [
      b[0],b[4],b[5],
      b[1]==="B"?"Booking":b[1]==="A"?"Airbnb":"Privado",
      nch, pax,
      b[8]||0,    // r[6] = col Y
      colU,       // r[7] = col U (main income shown)
      b[11]||0,   // r[8] = col Q (bruto)
      nch>0?colU/nch:0,        // r[9] = ADR (col U / noches)
      nch&&pax?colU/(nch*pax):0, // r[10] = €/p/n (col U based)
      b[9],b[10],
    ];
  });
}
// ── TAB: INGRESOS ─────────────────────────────────────────────────────────────
function TabIng({prop, year, activeBK, ingData, ex, onGoToInversion, onGoToGastos}) {
  const [expandTable, setExpandTable] = useState(false);

  // Filter income data
  const selYear = year !== "all" ? +year : null;
  
  const data = useMemo(() => 
    ingData.filter(r =>
      (prop === "all" || r[0] === prop) &&
      (year === "all" || r[11] === +year)
    ), [prop, year]);

  const prevData = useMemo(() => {
    if (!selYear) return null;
    return ingData.filter(r =>
      (prop === "all" || r[0] === prop) && r[11] === selYear - 1
    );
  }, [prop, selYear]);

  // Years that have data for this property
  const dataYears = useMemo(() => 
    [...new Set(ingData.filter(r => prop === "all" || r[0] === prop).map(r => r[11]))].sort()
  , [prop]);

  // ── KPIs ──────────────────────────────────────────────────────────────────
  const totalColU = data.reduce((s, r) => s + r[7], 0);
  const totalNoch = data.reduce((s, r) => s + r[4], 0);
  const totalNetY = data.reduce((s, r) => s + r[6], 0);

  const adr = totalNoch > 0 ? totalColU / totalNoch : 0;

  const revparDenom = useMemo(() => {
    if (selYear) return ingDenomYr(prop, selYear);
    return dataYears.reduce((s, y) => s + ingDenomYr(prop, y), 0);
  }, [prop, selYear, dataYears]);

  const revpar = revparDenom > 0 ? totalColU / revparDenom : 0;

  const gasFijos = fixedTot(prop === "all" ? "all" : prop, year === "all" ? "all" : +year, ex);
  const benefReal = totalNetY - gasFijos;

  // Prev year KPIs for comparison
  const prevColU = prevData ? prevData.reduce((s, r) => s + r[7], 0) : null;
  const prevNetY = prevData ? prevData.reduce((s, r) => s + r[6], 0) : null;
  const prevNoch = prevData ? prevData.reduce((s, r) => s + r[4], 0) : null;
  const prevADR = (prevColU && prevNoch) ? prevColU / prevNoch : null;
  const prevRevPARDenom = selYear ? ingDenomYr(prop, selYear - 1) : null;
  const prevRevPAR = (prevColU && prevRevPARDenom) ? prevColU / prevRevPARDenom : null;
  const prevGasFijos = selYear ? fixedTot(prop === "all" ? "all" : prop, selYear - 1, ex) : 0;
  const prevBenefReal = selYear && prevNetY !== null ? prevNetY - prevGasFijos : null;

  const delta = (cur, prev) => {
    if (!prev || prev === 0) return null;
    return ((cur - prev) / Math.abs(prev)) * 100;
  };
  const fmtDelta = (d) => {
    if (d === null) return null;
    const col = d >= 0 ? "var(--pos)" : "var(--neg)";
    const sign = d >= 0 ? "↑ +" : "↓ ";
    return <span style={{fontSize:11, color:col, marginTop:4, display:"block"}}>{sign}{Math.abs(d).toFixed(0)}% vs {selYear - 1}</span>;
  };

  // ── GRÁFICO 1: BARRAS AGRUPADAS POR MES (max 3 años) ──────────────────────
  const chartYears = useMemo(() => {
    const base = selYear || Math.max(...dataYears);
    return dataYears.filter(y => y <= base && y >= base - 2);
  }, [dataYears, selYear]);

  const TODAY = new Date();
  const todayY = TODAY.getFullYear(), todayM = TODAY.getMonth() + 1;

  // Monthly income by year (col U)
  const monthlyByYear = useMemo(() => {
    const out = {};
    chartYears.forEach(y => {
      out[y] = {};
      for (let m = 1; m <= 12; m++) {
        const rows = ingData.filter(r => (prop === "all" || r[0] === prop) && r[11] === y && r[12] === m);
        out[y][m] = rows.reduce((s, r) => s + r[7], 0);
      }
    });
    return out;
  }, [chartYears, prop]);

  // ── GRÁFICO 2: ADR multi-año ──────────────────────────────────────────────
  const adrCurrentYear = selYear || (dataYears.filter(y=>y<=todayY).length>0 ? Math.max(...dataYears.filter(y=>y<=todayY)) : dataYears.length ? Math.max(...dataYears) : todayY);
  const adrChartYears = useMemo(() => {
    if (selYear) return [selYear-2, selYear-1, selYear].filter(y => dataYears.includes(y));
    return [...dataYears];
  }, [selYear, dataYears]);

  const adrByYear = useMemo(() => {
    const out = {};
    adrChartYears.forEach(y => {
      out[y] = Array.from({length: 12}, (_, i) => {
        const m = i + 1;
        const rows = ingData.filter(r => (prop === "all" || r[0] === prop) && r[11] === y && r[12] === m);
        if (!rows.length) return null;
        const colUSum = rows.reduce((s, r) => s + r[7], 0);
        const nch = rows.reduce((s, r) => s + r[4], 0);
        return nch > 0 ? colUSum / nch : null;
      });
    });
    return out;
  }, [adrChartYears, prop, ingData]);

  // ── PLATAFORMAS ────────────────────────────────────────────────────────────
  const platforms = useMemo(() => {
    const plats = {};
    data.forEach(r => {
      const p = r[3] || "Privado";
      if (!plats[p]) plats[p] = {nombre: p, reservas: 0, ben: 0, nch: 0, pn: 0};
      plats[p].reservas++;
      plats[p].ben += r[7];
      plats[p].nch += r[4];
      plats[p].pn += r[4] * r[5];
    });
    return Object.values(plats)
      .filter(p => p.reservas > 0 && p.nombre !== "")
      .map(p => ({
        ...p,
        adr: p.nch > 0 ? p.ben / p.nch : 0,
        ppn: p.pn > 0 ? p.ben / p.pn : 0,
      }))
      .sort((a, b) => b.ben - a.ben);
  }, [data]);

  // Best value per column (for green highlight)
  const bestValues = useMemo(() => ({
    reservas: Math.max(...platforms.map(p => p.reservas)),
    ben: Math.max(...platforms.map(p => p.ben)),
    adr: Math.max(...platforms.map(p => p.adr)),
    ppn: Math.max(...platforms.map(p => p.ppn)),
  }), [platforms]);

  // ── TABLA RESERVAS ─────────────────────────────────────────────────────────
  const sortedReservations = useMemo(() =>
    [...data].filter(r => r[7] > 0).sort((a, b) => b[7] - a[7])
  , [data]);
  const displayedReservations = expandTable ? sortedReservations : sortedReservations.slice(0, 10);

  // ── RENDERS ────────────────────────────────────────────────────────────────
  const platColor = p => p === "Airbnb" ? "#f87171" : p === "Booking" ? "#60a5fa" : "#a78bfa";

  const COLORS3 = {oldest: "#6A8F8F", mid: "#3D5555", newest: GOLD_F};
  const colKeys = chartYears.length === 1 ? ["newest"] : chartYears.length === 2 ? ["mid","newest"] : ["oldest","mid","newest"];
  const colorOf = i => COLORS3[colKeys[i]] || COLORS3.newest;

  return <div>

    {/* ── KPIs ── */}
    <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:16}}>
      <div style={{...c.card, cursor:onGoToInversion?"pointer":"default"}} onClick={()=>onGoToInversion&&onGoToInversion()}>
        <div style={c.lbl}>Ingresos Brutos {onGoToInversion&&<span style={{fontSize:9,color:MUT,fontWeight:400}}>→ Mi Inversión</span>}</div>
        <div style={{...c.big("var(--pos)"), fontSize:20}}>{eur(Math.round(totalColU))}</div>
        <div style={{fontSize:10,color:MUT,marginTop:2}}>Lo que recibes en tu cuenta por alquileres</div>

function IngBarChart({monthlyByYear, years, colorOf, colKeys, COLORS3, todayY, todayM}) {
  const [tip, setTip] = useState(null);
  const W=820,H=220,PL=50,PB=22,PT=32,PR=10,cW=W-PL-PR,cH=H-PB-PT;
  const MES=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const maxV = Math.max(...years.flatMap(y => Array.from({length:12},(_,i) => monthlyByYear[y]?.[i+1]||0)), 1);
  const slotW = cW/12;
  const nBars = years.length;
  const bW = Math.max(8, Math.min(26, (slotW-10)/nBars-1));
  const totalBW = bW*nBars+1*(nBars-1);
  return <div style={{position:"relative"}}>
    {tip && <div className="tip" style={{left:tip.x+12,top:tip.y-40}}>{tip.label}</div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} onMouseLeave={()=>setTip(null)}>
      {[0,.25,.5,.75,1].map(r=>{
        const y=PT+cH*(1-r);
        const v=maxV*r;
        const lbl=v>=1000?(v/1000).toFixed(0)+"k€":v.toFixed(0)+"€";
        return <g key={r}><line x1={PL} x2={W-PR} y1={y} y2={y} stroke="var(--chart-grid)" strokeWidth={0.5}/><text x={PL-4} y={y+4} textAnchor="end" fill="#8A8C80" fontSize={8}>{lbl}</text></g>;
      })}
      {Array.from({length:12},(_,mi)=>{
        const m=mi+1;
        const sX=PL+mi*slotW;
        const bSX=sX+(slotW-totalBW)/2;
        return <g key={m}>
          {years.map((yr,yi)=>{
            const val=monthlyByYear[yr]?.[m]||0;
            const bH=Math.max(2,(val/maxV)*cH);
            const x=bSX+yi*(bW+1);
            const yy=PT+cH-bH;
            const col=colorOf(yi);
            const isFuture=yr===todayY&&m>todayM;
            return <g key={yr}>
              <rect x={x} y={yy} width={bW} height={bH} fill={col} rx={2}
                opacity={isFuture?0.2:1}
                style={{cursor:"crosshair"}}
                onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,label:`${MES[m]} ${yr} · ${Math.round(val).toLocaleString("es-ES")} €`})}/>
              {val>0&&!isFuture&&<text x={x+bW/2} y={yy-4} textAnchor="middle" fill={col} fontSize={7} fontWeight="700">{Math.round(val/1000*10)/10}k</text>}
            </g>;
          })}
          <text x={sX+slotW/2} y={H-5} textAnchor="middle" fill="#8A8C80" fontSize={9}>{MES[m]}</text>
        </g>;
      })}
    </svg>
    <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      {years.map((yr,yi)=><div key={yr} style={{display:"flex",alignItems:"center",gap:5,fontSize:11.5,color:"var(--mut)"}}>
        <div style={{width:12,height:12,borderRadius:2,background:colorOf(yi),flexShrink:0}}/>
        <span style={{color:colorOf(yi),fontWeight:700}}>{yr}</span>
      </div>)}
    </div>
  </div>;
}

// ── GRÁFICO ADR MULTI-AÑO ────────────────────────────────────────────────
function IngADRChart({linesByYear, years, currentYear}) {
  const [tip, setTip] = useState(null);
  const W=820,H=180,PL=50,PB=22,PT=16,PR=10,cW=W-PL-PR,cH=H-PB-PT;
  const MES=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const allVals = years.flatMap(y=>(linesByYear[y]||[]).filter(v=>v!==null));
  const maxV = Math.max(...allVals, 1) * 1.1;
  const px = i => PL + i*(cW/11);
  const py = v => PT + cH*(1-v/maxV);
  const isAllYears = years.length > 3;
  // Colors anchored on max(years) — newest year=gold, same as bar chart
  const YR_PAL = [GOLD_F, "#3D5555", "#6A8F8F", "#9B7EC8", "#C8895A", "#7BC8A0"];
  const colorRef = years.length ? Math.max(...years) : currentYear;
  const lineColor = y => {
    const off = colorRef - y;
    return YR_PAL[Math.min(Math.max(off, 0), YR_PAL.length - 1)];
  };
  const buildPath = pts => {
    let d="", inPath=false;
    pts.forEach(p=>{
      if(p===null){inPath=false;return;}
      if(!inPath){d+=`M${p.x},${p.y}`;inPath=true;}
      else d+=` L${p.x},${p.y}`;
    });
    return d;
  };
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-40}}>{tip.label}</div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} onMouseLeave={()=>setTip(null)}>
      {[0,.25,.5,.75,1].map(r=>{
        const y=PT+cH*(1-r);
        return <g key={r}><line x1={PL} x2={W-PR} y1={y} y2={y} stroke="var(--chart-grid)" strokeWidth={0.5}/><text x={PL-4} y={y+4} textAnchor="end" fill="#8A8C80" fontSize={8}>{Math.round(maxV*r)}€</text></g>;
      })}
      {years.map(yr=>{
        const vals = linesByYear[yr]||[];
        const pts = vals.map((v,i)=>v!==null?{x:px(i),y:py(v)}:null);
        const col = lineColor(yr);
        const isCur = yr===currentYear;
        const isFuture = yr>currentYear;
        return <g key={yr} opacity={isFuture?0.5:isCur?1:isAllYears?0.5:0.75}>
          <path d={buildPath(pts)} fill="none" stroke={col} strokeWidth={isCur?2.5:1.5} strokeLinejoin="round"/>
          {pts.map((p,i)=>p&&<circle key={i} cx={p.x} cy={p.y} r={isCur?3.5:2.5} fill={col} style={{cursor:"crosshair"}}
            onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,label:`ADR ${MES[i+1]} ${yr}: ${Math.round(vals[i])} €/noche`})}/>)}
        </g>;
      })}
      {Array.from({length:12},(_,i)=><text key={i} x={px(i)} y={H-5} textAnchor="middle" fill="#8A8C80" fontSize={9}>{MES[i+1]}</text>)}
    </svg>
    <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      {years.map(yr=>{
        const col=lineColor(yr);
        const isCur=yr===currentYear;
        return <div key={yr} style={{display:"flex",alignItems:"center",gap:5,fontSize:11.5,opacity:isCur?1:isAllYears?0.65:0.85}}>
          <div style={{width:20,height:2,background:col,flexShrink:0,borderRadius:1}}/>
          <span style={{color:col,fontWeight:isCur?700:400}}>{yr}</span>
        </div>;
      })}
    </div>
  </div>;
}

// ── OCUPACIÓN HELPERS ─────────────────────────────────────────────────────────
function ocuDaysInMonth(yr,mo){return new Date(yr,mo,0).getDate();}

// Day-by-day proration for chart bars
function ocuNochesByYearMonth(propFilter,ocuBkSrc){
  // Prorate nights day-by-day so cross-month bookings are split correctly
  const out={};
  ocuBkSrc.filter(b=>propFilter==="all"||b[0]===propFilter).forEach(b=>{
    const ci=new Date(b[4]),co=new Date(b[5]);
    let d=new Date(ci);
    while(d<co){
      const y=d.getFullYear(),m=d.getMonth()+1;
      if(!out[y]) out[y]={};
      out[y][m]=(out[y][m]||0)+1;
      d.setDate(d.getDate()+1);
    }
  });
  return out;
}

// Prorate bookings day-by-day → { "year|month": nights }
// yearFilter: number to restrict to one year, or null for all
function buildByYM(bkList,yearFilter){
  const out={};
  bkList.forEach(b=>{
    const ci=new Date(b[4]),co=new Date(b[5]);
    let d=new Date(ci);
    while(d<co){
      const y=d.getFullYear(),m=d.getMonth()+1;
      if(!yearFilter||y===yearFilter){
        const k=`${y}|${m}`;
        out[k]=(out[k]||0)+1;
      }
      d.setDate(d.getDate()+1);
    }
  });
  return out;
}

// ── REGLA DEFINITIVA DE DENOMINADOR ──────────────────────────────────────────
// 365 días (366 bisiesto), salvo el año de la primera reserva de la propiedad
// donde el denominador son los días desde esa primera reserva hasta el 31-Dic.
function isLeap(y){return (y%4===0&&y%100!==0)||y%400===0;}

function firstBkDate(prop){
  // Use cached bk data to find first booking date
  var src=[];try{src=JSON.parse(localStorage.getItem("pt_bk_cache"))||[];}catch(e){}
  const bk=src.filter(b=>prop==="all"||b[0]===prop);
  if(!bk.length) return null;
  return bk.map(b=>b[4]).sort()[0];
}

// Denominator for ONE specific year
function ocuDenomYr(prop,yr){
  const fd=firstBkDate(prop);
  if(!fd) return isLeap(yr)?366:365;
  const firstDate=new Date(fd);
  if(firstDate.getFullYear()===yr){
    // Exception: days from first booking to Dec 31 of that year
    const dec31=new Date(yr,11,31);
    return Math.round((dec31-firstDate)/86400000)+1;
  }
  return isLeap(yr)?366:365;
}

// Total denominator for prop + period (selYr=null means all years)
function ocuDenomTotal(prop,selYr,dataYears){
  if(selYr) return ocuDenomYr(prop,selYr);
  if(!dataYears||!dataYears.length) return 365;
  return dataYears.reduce(function(s,y){return s+ocuDenomYr(prop,y);},0);
}

// Sum nights from a byYM map
function byYMNights(byYM){
  return Object.values(byYM).reduce(function(s,n){return s+n;},0);
}

function ocuPctMonth(noches,yr,mo){
  const days=ocuDaysInMonth(yr,mo);
  return days>0?Math.min(100,(noches/days*100)):0;
}

// Grouped bar chart for Ocupación — max 3 years
function OcuBarChart({years,byYearMonth,TODAY_STR}){
  const [tip,setTip]=useState(null);
  const COLORS={oldest:"#6A8F8F",mid:"#3D5555",newest:GOLD_F};
  const colKeys=years.length===1?["newest"]:years.length===2?["mid","newest"]:["oldest","mid","newest"];
  const colorOf=(idx)=>COLORS[colKeys[idx]]||COLORS.newest;
  // Wider viewBox to accommodate doubled bar width while keeping group spacing
  const W=820,H=210,PL=8,PB=22,PT=30,PR=8,cW=W-PL-PR,cH=H-PB-PT;
  const maxN=Math.max(...years.flatMap(y=>Array.from({length:12},(_,i)=>byYearMonth[y]?.[i+1]||0)),1);
  const slotW=cW/12; // ≈67px per month slot
  const nBars=years.length;
  const barGap=1; // tight gap between bars within same group
  // bW gives ≈19-20px bars (≈2× previous ~10px), group spacing ≈9px
  const bW=Math.max(8,Math.min(26,(slotW-10)/nBars-barGap));
  const totalBW=bW*nBars+barGap*(nBars-1);
  const todayParts=TODAY_STR.split("-");
  const todayY=+todayParts[0],todayM=+todayParts[1];
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-40,pointerEvents:"none",zIndex:999}}>
      {tip.label}
    </div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} onMouseLeave={()=>setTip(null)}>
      {Array.from({length:12},(_,mi)=>{
        const m=mi+1;
        const sX=PL+mi*slotW;
        const bSX=sX+(slotW-totalBW)/2;
        const isFuture=years.includes(todayY)&&m>todayM&&years[years.length-1]===todayY;
        return <g key={m}>
          {years.map((yr,yi)=>{
            const n=byYearMonth[yr]?.[m]||0;
            const bH=Math.max(2,(n/maxN)*cH);
            const x=bSX+yi*(bW+barGap);
            const y=PT+cH-bH;
            const col=colorOf(yi);
            const future=isFuture&&yi===years.length-1;
            return <g key={yr}>
              <rect x={x} y={y} width={bW} height={bH} fill={col} rx={2}
                opacity={future?0.22:1}
                style={{cursor:"crosshair",transition:"opacity .2s"}}
                onMouseEnter={e=>{const days=ocuDaysInMonth(yr,m);const pct=days>0?Math.min(100,n/days*100):0;setTip({x:e.clientX,y:e.clientY,label:`${ML[m]} ${yr} · ${n} noches (${pct.toFixed(0)}%)`});}}/>
              {n>0&&!future&&<text x={x+bW/2} y={y-4} textAnchor="middle" fill={col} fontSize={8} fontWeight="700">{n}</text>}
            </g>;
          })}
          {/* Month label */}
          <text x={sX+slotW/2} y={H-5} textAnchor="middle" fill="#8A8C80" fontSize={9}>{MS[m]}</text>
        </g>;
      })}
    </svg>
    {/* Legend */}
    <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      {years.map((yr,yi)=><div key={yr} style={{display:"flex",alignItems:"center",gap:5,fontSize:11.5,color:"var(--mut)"}}>
        <div style={{width:12,height:12,borderRadius:2,background:colorOf(yi),flexShrink:0}}/>
        <span style={{color:colorOf(yi),fontWeight:700}}>{yr}</span>
      </div>)}
    </div>
  </div>;
}

function TabHue({prop,year,activeBK}){
  // OCU data filtered
  const okuAll=useMemo(()=>(activeBK||[]).filter(b=>prop==="all"||b[0]===prop),[prop,activeBK]);
  const okuFiltered=useMemo(()=>okuAll.filter(b=>year==="all"||b[9]===+year),[okuAll,year]);

  // Años con datos
  const allDataYears=useMemo(()=>[...new Set(okuAll.map(b=>b[9]))].sort(),[okuAll]);
  const selYr=year!=="all"?+year:null;

  // Chart years: max 3
  const chartYears=useMemo(()=>{
    if(selYr){
      return allDataYears.filter(y=>y<=selYr).slice(-3);
    }
    return allDataYears.slice(-3);
  },[selYr,allDataYears]);

  // ── OCUPACIÓN — denominador fijo: 365/366, excepción primer año ─────────────
  // Numerator: prorated nights day-by-day (handles cross-month/year bookings)
  // KPI noches = SUM(col N) per brief
  const nochesKpi=useMemo(()=>okuFiltered.reduce((s,b)=>s+b[6],0),[okuFiltered]);
  const denominadorDias=useMemo(()=>ocuDenomTotal(prop,selYr,allDataYears),[prop,selYr,allDataYears]);
  const ocuMedia=denominadorDias>0?Math.min(100,nochesKpi/denominadorDias*100):0;

  // reservas = COUNT of bookings by check-in year (booking-level metric)
  const reservas=okuFiltered.length;
  const withFR=okuFiltered.filter(b=>b[14]);
  const antelacion=withFR.length>0?withFR.reduce((s,b)=>{const d=(new Date(b[4])-new Date(b[14]))/86400000;return s+Math.max(0,d);},0)/withFR.length:null;

  // Previous year comparison — col N directly
  const prevKpis=useMemo(()=>{
    if(!selYr) return null;
    const py=selYr-1;
    const prevBks=okuAll.filter(b=>b[9]===py);
    const prevN=prevBks.reduce((s,b)=>s+b[6],0);
    if(!prevN) return null;
    const prevDenom=ocuDenomYr(prop,py);
    return{noches:prevN,reservas:prevBks.length,ocuMedia:prevDenom>0?Math.min(100,prevN/prevDenom*100):0};
  },[selYr,okuAll,prop]);

  function delta(curr,prev,isCount){
    if(!prev||prev===0) return null;
    const d=((curr-prev)/prev*100);
    const sign=d>=0?"↑ +":"↓ ";
    const col=d>=0?"var(--pos)":"var(--neg)";
    return <div style={{fontSize:10.5,color:col,marginTop:4,fontWeight:600}}>{sign}{Math.abs(d).toFixed(0)}% vs {selYr-1}</div>;
  }

  // Alert: month in current year with 0 reservas but prev year had some
  const alertItems=useMemo(()=>{
    if(!selYr) return [];
    const py=selYr-1;
    const alerts=[];
    for(let m=1;m<=12;m++){
      const curr=okuFiltered.filter(b=>b[8]===m).length;
      const prev=okuAll.filter(b=>b[7]===py&&b[8]===m).length;
      if(curr===0&&prev>0) alerts.push({month:ML[m],prevN:prev});
    }
    return alerts;
  },[selYr,okuFiltered,okuAll]);

  // Chart data
  const byYearMonth=useMemo(()=>ocuNochesByYearMonth(prop,okuAll),[prop,okuAll]);

  // Platform distribution
  const platData=useMemo(()=>{
    const total=okuFiltered.length;
    const totalN=okuFiltered.reduce((s,b)=>s+b[6],0);
    return["B","A","P"].map(code=>{
      const pb=okuFiltered.filter(b=>b[1]===code);
      const pn=pb.reduce((s,b)=>s+b[6],0);
      return{code,name:{B:"Booking",A:"Airbnb",P:"Privado"}[code],col:{B:"#60a5fa",A:"#f87171",P:"#c084fc"}[code],cnt:pb.length,noches:pn,pctRes:total>0?pb.length/total*100:0,pctNoc:totalN>0?pn/totalN*100:0};
    }).filter(p=>p.cnt>0);
  },[okuFiltered]);

  // Booking lead-time by quarter of stay (all years, for pattern visibility)
  const qAntData=useMemo(()=>{
    const withBkDate=okuAll.filter(b=>b[14]);
    const buckets={Q1:[],Q2:[],Q3:[],Q4:[]};
    withBkDate.forEach(b=>{
      const m=new Date(b[4]).getMonth();
      const q=m<3?"Q1":m<6?"Q2":m<9?"Q3":"Q4";
      const days=(new Date(b[4])-new Date(b[14]))/86400000;
      if(days>=0) buckets[q].push(days);
    });
    return["Q1","Q2","Q3","Q4"].map(q=>{
      const vals=buckets[q];
      const avg=vals.length?Math.round(vals.reduce((s,v)=>s+v,0)/vals.length):null;
      return{q,label:{Q1:"Q1 — Ene · Mar",Q2:"Q2 — Abr · Jun",Q3:"Q3 — Jul · Sep",Q4:"Q4 — Oct · Dic"}[q],avg,n:vals.length};
    });
  },[okuAll]);

  // Portfolio comparison — LV vs EL
  const showPortfolio=useMemo(()=>{
    const lvData=okuAll.filter(b=>b[0]==="LV"&&(year==="all"||b[9]===+year));
    const elData=okuAll.filter(b=>b[0]==="EL"&&(year==="all"||b[9]===+year));
    return lvData.length>0&&elData.length>0;
  },[year]);

  const portfolioStats=useMemo(()=>{
    if(!showPortfolio) return null;
    const calc=function(p){
      const bkProp=okuAll.filter(b=>b[0]===p);
      const propDataYears=[...new Set(bkProp.map(b=>b[9]))].sort();
      const bkFilt=bkProp.filter(b=>year==="all"||b[9]===+year);
      const portN=bkFilt.reduce((s,b)=>s+b[6],0);
      const portDenom=ocuDenomTotal(p,selYr,propDataYears);
      const ocu=portDenom>0?Math.min(100,portN/portDenom*100):0;
      const fr=bkFilt.filter(b=>b[14]);
      const ant=fr.length>0?fr.reduce((s,b)=>s+Math.max(0,(new Date(b[4])-new Date(b[14]))/86400000),0)/fr.length:null;
      const byMonthN={};
      bkFilt.forEach(function(b){const m=new Date(b[4]).getMonth()+1;byMonthN[m]=(byMonthN[m]||0)+b[6];});
      const allMonths=Object.keys(byMonthN).map(Number);
      const flojo=allMonths.length?allMonths.reduce(function(a,b){return byMonthN[a]<byMonthN[b]?a:b;}):null;
      const dates=bkProp.filter(b=>b[4]).map(b=>b[4]).sort();
      return{ocu,ant,flojo,firstDate:dates[0]||null};
    };
    return{LV:calc("LV"),EL:calc("EL")};
  },[showPortfolio,year,selYr]);

  // Level 3 details
  const detailStats=useMemo(function(){
    if(!okuFiltered.length) return null;
    const durMedia=nochesKpi/Math.max(1,reservas);
    return{durMedia};
  },[okuFiltered,nochesKpi,reservas]);

  const propColor=prop==="EL"?TEAL:GOLD;

  return <div>
    {/* ── NIVEL 1: KPIs ─── */}
    <div style={{...c.grid("repeat(4,1fr)"),marginBottom:12}}>
      <div style={c.card}>
        <div style={c.lbl}>Noches ocupadas</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22}}>{num(nochesKpi)}</span></div>
        <div style={c.desc}>Total período seleccionado</div>
        {selYr&&prevKpis&&delta(nochesKpi,prevKpis.noches)}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Ocupación media</div>
        <div style={{...c.big(ocuMedia>60?"var(--pos)":ocuMedia<40?"var(--neg)":TXT)}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:22}}>{_fmtN(ocuMedia,1)}%</span></div>
        <div style={c.desc}>Noches ÷ días disponibles</div>
        {selYr&&prevKpis&&delta(ocuMedia,prevKpis.ocuMedia)}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Nº de reservas</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontSize:22}}>{reservas}</span></div>
        <div style={c.desc}>Alquileres del período</div>
        {selYr&&prevKpis&&delta(reservas,prevKpis.reservas)}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Duración media estancia</div>
        <div style={c.big(propColor)}>
          {detailStats?<span style={{fontFamily:"'DM Mono',monospace",fontSize:22}}>{_fmtN(detailStats.durMedia,1)}<span style={{fontSize:14,fontWeight:400,marginLeft:3}}>noches</span></span>:<span style={{fontSize:13,color:MUT}}>Sin datos</span>}
        </div>
        <div style={c.desc}>Media de noches por reserva</div>
      </div>
    </div>

    {/* ── ALERTA ─── */}
    {alertItems.length>0&&<div style={{background:"#FFF8EC",border:`1px solid ${GOLD}`,borderRadius:9,padding:"10px 14px",marginBottom:12}}>
      {alertItems.map(({month,prevN})=><div key={month} style={{color:"#8A5A00",fontSize:12.5,display:"flex",alignItems:"center",gap:7}}>
        <span style={{fontSize:15}}>⚠️</span>
        <span><b>{month}</b> sin reservas. El año pasado en esta fecha tenías <b>{prevN}</b> reserva{prevN>1?"s":""}</span>
      </div>)}
    </div>}

    {/* ── NIVEL 2: GRÁFICO NOCHES POR MES ─── */}
    <div style={{...c.sec,marginTop:8}}>Noches por mes — comparativa anual</div>
    <div style={c.card}>
      <OcuBarChart years={chartYears} byYearMonth={byYearMonth} TODAY_STR={new Date().toISOString().slice(0,10)}/>
      <div style={{fontSize:10.5,color:MUT,marginTop:8,textAlign:"center"}}>Noches sobre cada barra (prorateadas por mes calendario).</div>
    </div>

    {/* ── NIVEL 2: PLATAFORMAS ─── */}
    <div style={c.sec}>Distribución por plataforma</div>
    <div style={c.card}>
      {platData.length===0?<div style={{color:MUT,fontSize:12}}>Sin datos para el período seleccionado</div>:
      platData.map(p=><div key={p.code} style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12.5}}>
          <span style={{fontWeight:700,color:p.col,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:p.col,display:"inline-block"}}/>
            {p.name}
          </span>
          <span style={{color:MUT,fontSize:11.5}}>
            <b style={{color:TXT}}>{p.cnt}</b> reservas ·&nbsp;
            <b style={{color:TXT}}>{p.noches}</b> noches ·&nbsp;
            <b style={{color:p.col}}>{_fmtN(p.pctNoc,0)}%</b>
          </span>
        </div>
        <div style={{background:"var(--bd)",borderRadius:4,height:8,overflow:"hidden"}}>
          <div style={{width:`${p.pctNoc}%`,height:"100%",background:p.col,borderRadius:4,transition:"width .4s"}}/>
        </div>
      </div>)}
    </div>

    {/* ── NIVEL 2: PATRONES DE RESERVA ─── */}
    <div style={c.sec}>Patrones de reserva — antelación media por trimestre</div>
    <div style={c.card}>
      {qAntData.every(q=>q.avg===null)
        ?<div style={{color:MUT,fontSize:12}}>Sin datos de fecha de reserva (disponibles en reservas Booking/Airbnb desde 2024–2025)</div>
        :(()=>{
          const valid=qAntData.filter(q=>q.avg!==null);
          const maxVal=Math.max(...valid.map(d=>d.avg),1);
          const maxQ=valid.reduce((a,b)=>a.avg>b.avg?a:b,valid[0]);
          const minQ=valid.reduce((a,b)=>a.avg<b.avg?a:b,valid[0]);
          return <>
            {qAntData.map(q=>q.avg===null?null:<div key={q.q} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5,fontSize:12.5}}>
                <span style={{fontWeight:600,color:TXT}}>{q.label}</span>
                <span style={{fontFamily:"'DM Mono',monospace",color:propColor,fontWeight:700}}>{q.avg} días<span style={{color:MUT,fontWeight:400,fontSize:11,marginLeft:6}}>({q.n} reservas)</span></span>
              </div>
              <div style={{background:"var(--bd)",borderRadius:4,height:8,overflow:"hidden"}}>
                <div style={{width:`${q.avg/maxVal*100}%`,height:"100%",background:propColor,borderRadius:4,opacity:0.8,transition:"width .4s"}}/>
              </div>
            </div>)}
            {valid.length>=2&&<div style={{marginTop:4,paddingTop:10,borderTop:`1px solid ${BD}`,display:"flex",flexDirection:"column",gap:5}}>
              <div style={{fontSize:12,color:MUT,display:"flex",gap:6}}><span style={{color:propColor,fontWeight:700}}>→</span><span>Las estancias de <b style={{color:TXT}}>{maxQ.label.split("—")[1].trim()}</b> se reservan con más antelación ({maxQ.avg} días de media) — conviene tener precios publicados con meses de margen.</span></div>
              {minQ.q!==maxQ.q&&<div style={{fontSize:12,color:MUT,display:"flex",gap:6}}><span style={{color:propColor,fontWeight:700}}>→</span><span><b style={{color:TXT}}>{minQ.label.split("—")[1].trim()}</b> tiene menor antelación ({minQ.avg} días) — mayor riesgo de huecos de última hora.</span></div>}
            </div>}
          </>;
        })()
      }
    </div>

    {/* ── NIVEL 2: COMPARATIVA PORTFOLIO ─── */}
    {showPortfolio&&portfolioStats&&<div>
      <div style={c.sec}>Comparativa portfolio</div>
      <div style={c.card}>
        {[
          {lbl:"Ocupación media",lvV:`${_fmtN(portfolioStats.LV.ocu,1)}%`,elV:`${_fmtN(portfolioStats.EL.ocu,1)}%`},
          {lbl:"Antelación media",lvV:portfolioStats.LV.ant!==null?`${Math.round(portfolioStats.LV.ant)}d`:"—",elV:portfolioStats.EL.ant!==null?`${Math.round(portfolioStats.EL.ant)}d`:"—"},
          {lbl:"Mes más flojo",lvV:portfolioStats.LV.flojo?ML[portfolioStats.LV.flojo]:"—",elV:portfolioStats.EL.flojo?ML[portfolioStats.EL.flojo]:"—"},
        ].map(row=><div key={row.lbl} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:`1px solid ${BD}`}}>
          <div style={{width:130,fontSize:11.5,color:MUT,flexShrink:0}}>{row.lbl}</div>
          <div style={{flex:1,display:"flex",gap:16,fontSize:12.5}}>
            <span><b style={{color:GOLD_F}}>LV</b> <span style={{fontFamily:"'DM Mono',monospace",color:TXT}}>{row.lvV}</span></span>
            <span style={{color:BD}}>·</span>
            <span><b style={{color:TEAL_F}}>EL</b> <span style={{fontFamily:"'DM Mono',monospace",color:TXT}}>{row.elV}</span></span>
          </div>
          <div style={{fontSize:10.5,color:MUT,cursor:"default"}}>ver detalle ▾</div>
        </div>)}
        <div style={{fontSize:10.5,color:MUT,marginTop:8}}>
          Los Elefantes con datos desde {portfolioStats.EL.firstDate?`${portfolioStats.EL.firstDate.slice(0,7).replace("-","/")}`:""}.
          Las Vegas Golf activo desde 2022.
        </div>
      </div>
    </div>}

  </div>;
}


// ── TAB: GASTOS ─────────────────────────────────────────────────────────────
function TabGastos({prop,year,ex,setEx,activeBK,gasData,setGasData}){
  const [addModal,setAddModal]=useState(false);
  const [modModal,setModModal]=useState(false);
  const CUR_YEAR=new Date().getFullYear();
  const YEAR_OPTS=[...new Set(["2021","2022","2023","2024","2025","2026",String(CUR_YEAR),String(CUR_YEAR+1)])].sort();
  const initProp=prop==="all"?"LV":prop;
  const initYear=year!=="all"?year:String(CUR_YEAR);
  const [form,setForm]=useState({prop:initProp,year:initYear,monthFrom:"1",monthTo:"1",cat:"Comunidad",amount:"",nota:""});
  const [modForm,setModForm]=useState({prop:initProp,cat:"Comunidad",year:initYear,month:"1",amount:""});
  const ps=prop==="all"?["LV","EL"]:[prop];

  const CAT_B_NAMES=["IBI y Basuras","Seguro","Comunidad","Agua","Luz","Derramas","Internet","Alarma"];
  const CAT_DROP=[...CAT_B_NAMES,"Impuestos","Otro"];
  const COL_B={"IBI y Basuras":"#60a5fa","Seguro":"#a78bfa","Seguros":"#a78bfa","Comunidad":"#34d399","Agua":"#38bdf8","Luz":"#fbbf24","Derramas":"#f87171","Internet":"#fb923c","Alarma":"#e879f9"};
  const COL_A={"Comisiones Booking":"#e2a54b","Comisiones Airbnb":"#ff7b45","Costes Rotación":"#94a3b8"};

  const bkSel=useMemo(()=>activeBK.filter(b=>(prop==="all"||b[0]===prop)&&(year==="all"||b[9]===+year)),[prop,year,activeBK]);

  // ── Tipo A: variable per-booking costs ──────────────────────────────────────
  const comisBooking=useMemo(()=>bkSel.filter(b=>b[1]==='B').reduce((s,b)=>s+(b[12]||0),0),[bkSel]);
  const comisAirbnb=useMemo(()=>bkSel.filter(b=>b[1]==='A').reduce((s,b)=>s+(b[12]||0),0),[bkSel]);
  const costsRot=useMemo(()=>bkSel.reduce((s,b)=>s+(b[13]||0),0),[bkSel]);
  const totalTipoA=costsRot;
  const totalComisPlat=comisBooking+comisAirbnb;

  // ── Tipo B: gasData excl. Impuestos y Precio Compra ─────────────────────────
  const catBTotals=useMemo(()=>{
    const tots={};
    (gasData||[]).filter(g=>(prop==="all"||g[0]===prop)&&(year==="all"||g[1]===+year)&&g[3]!=="Precio Compra"&&g[3]!=="Impuestos")
      .forEach(g=>{tots[g[3]]=(tots[g[3]]||0)+g[4];});
    return tots;
  },[prop,year,gasData]);
  const totalTipoB=useMemo(()=>Object.values(catBTotals).reduce((s,v)=>s+v,0),[catBTotals]);

  // ── Tipo C: Impuestos from gasData ───────────────────────────────────────────
  const totalTipoC=useMemo(()=>(gasData||[]).filter(g=>(prop==="all"||g[0]===prop)&&(year==="all"||g[1]===+year)&&g[3]==="Impuestos").reduce((s,g)=>s+g[4],0),[prop,year,gasData]);

  const totalGastos=totalTipoA+totalTipoB+totalTipoC;

  // ── Chart by year (A+B+C) ────────────────────────────────────────────────────
  const chartYears=useMemo(()=>[...new Set([
    ...activeBK.filter(b=>prop==="all"||b[0]===prop).map(b=>b[9]),
    ...(gasData||[]).filter(g=>(prop==="all"||g[0]===prop)&&g[3]!=="Precio Compra").map(g=>g[1])
  ])].sort(),[activeBK,gasData,prop]);

  const chartData=useMemo(()=>chartYears.map(yr=>{
    const bkY=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr);
    const aVal=bkY.reduce((s,b)=>s+(b[13]||0),0);
    const gasY=(gasData||[]).filter(g=>(prop==="all"||g[0]===prop)&&g[1]===yr&&g[3]!=="Precio Compra");
    return{lbl:String(yr),val:aVal+gasY.reduce((s,g)=>s+g[4],0)};
  }),[chartYears,activeBK,gasData,prop]);

  // ── Monthly table ─────────────────────────────────────────────────────────────
  const monthlyTableRows=useMemo(()=>{
    const gasF=(gasData||[]).filter(g=>(prop==="all"||g[0]===prop)&&(year==="all"||g[1]===+year)&&g[3]!=="Precio Compra");
    const byYM={};
    gasF.forEach(g=>{
      const k=g[1]+"|"+g[2];
      if(!byYM[k])byYM[k]={yr:g[1],m:g[2],cats:{},notas:{}};
      byYM[k].cats[g[3]]=(byYM[k].cats[g[3]]||0)+g[4];
      if(g[5])byYM[k].notas[g[3]]=byYM[k].notas[g[3]]?byYM[k].notas[g[3]]+"; "+g[5]:g[5];
    });
    return Object.values(byYM).sort((a,b)=>a.yr!==b.yr?a.yr-b.yr:a.m-b.m);
  },[gasData,prop,year]);

  const allMonthlyCats=useMemo(()=>{
    const fromData=monthlyTableRows.flatMap(r=>Object.keys(r.cats));
    const combined=[...new Set([...CAT_B_NAMES,...fromData])].filter(c=>c!=="Precio Compra"&&c!=="Impuestos").sort();
    if((gasData||[]).some(g=>g[3]==="Impuestos"&&(prop==="all"||g[0]===prop))) combined.push("Impuestos");
    return combined;
  },[monthlyTableRows,gasData,prop]);

  // ── Dynamic cats for mod form ────────────────────────────────────────────────
  const gasCats=useMemo(()=>[...new Set([...CAT_DROP,...(gasData||[]).filter(g=>g[3]!=="Precio Compra").map(g=>g[3])])].sort(),[gasData]);

  // ── Save handlers ─────────────────────────────────────────────────────────────
  function saveExpense(){
    const a=parseFloat(form.amount);if(!a) return;
    // Capture all form values upfront so the loop always uses the same snapshot
    const fProp=form.prop, fYear=+form.year, fCat=form.cat, fNota=form.nota||"";
    const mFrom=+form.monthFrom, mTo=Math.max(+form.monthFrom,+form.monthTo);
    console.log("[PropTrack] saveExpense payload →",{prop:fProp,year:fYear,monthFrom:mFrom,monthTo:mTo,cat:fCat,importe:a,nota:fNota});
    const propName=fProp==="LV"?"Las Vegas Golf":fProp==="EL"?"Los Elefantes":fProp;
    const ng=[...(gasData||[])];
    for(let m=mFrom;m<=mTo;m++){
      ng.push([fProp,fYear,m,fCat,a,fNota]);
      callWebhook({action:"add_gasto",propiedad:propName,anio:fYear,mes:m,categoria:fCat,importe:a,nota:fNota});
    }
    if(setGasData)setGasData(ng);_liveGas=ng;lsSet("pt_gas_cache",ng);
    const n=mTo-mFrom+1;
    showToast(`Gasto añadido${n>1?` (${n} meses)`:""}  ✓`,GRN_F);setAddModal(false);
  }
  function saveModGasto(){
    const a=parseFloat(modForm.amount);if(!a){showToast("Introduce un importe válido",RED_F);return;}
    const mProp=prop==="all"?modForm.prop:prop;
    const ng=(gasData||[]).map(g=>g[0]===mProp&&g[3]===modForm.cat&&g[1]===+modForm.year&&g[2]===+modForm.month?[g[0],g[1],g[2],g[3],a,...g.slice(5)]:g);
    if(setGasData)setGasData(ng);_liveGas=ng;lsSet("pt_gas_cache",ng);
    callWebhook({action:"modify_gasto",prop:mProp,cat:modForm.cat,year:+modForm.year,month:+modForm.month,amount:a});
    showToast("Gasto actualizado ✓",GRN_F);setModModal(false);
  }

  // Download Excel — only selected year's data
  function dlExcel(){
    if(typeof XLSX==="undefined"){showToast("Librería XLSX no disponible",RED_F);return;}
    const selYrs=year==="all"?[2022,2023,2024,2025,2026]:[+year];
    const header=["Mes",...selYrs.map(String),"Total"];
    const rows=[header];
    // Tipo B rows
    CAT_B.forEach(cat=>{
      const row=[cat];let rowTotal=0;
      selYrs.forEach(yr=>{
        let v=0;ps.forEach(p=>{v+=(MONTHLY_FIXED[p]?.[yr]?.[1]?.[cat]||0);// sum across months
        Object.values(MONTHLY_FIXED[p]?.[yr]||{}).forEach(m=>{v+=(m[cat]||0);});v-=(MONTHLY_FIXED[p]?.[yr]?.[1]?.[cat]||0);// fix double-count
        });
        // recalculate correctly
        v=0;ps.forEach(p=>{Object.values(MONTHLY_FIXED[p]?.[yr]||{}).forEach(m=>{v+=(m[cat]||0);});});
        row.push(Math.round(v*100)/100);rowTotal+=v;
      });
      row.push(Math.round(rowTotal*100)/100);rows.push(row);
    });
    // Impuestos IRPF
    const irpfRow=["Impuestos IRPF"];let irpfTotal=0;
    selYrs.forEach(yr=>{let v=0;ps.forEach(p=>{Object.values(MONTHLY_FIXED[p]?.[yr]||{}).forEach(m=>{v+=(m.Impuestos||0);});});irpfRow.push(Math.round(v*100)/100);irpfTotal+=v;});
    irpfRow.push(Math.round(irpfTotal*100)/100);rows.push(irpfRow);
    // Rotación
    const rotRow=["Rotación"];let rotTotal=0;
    selYrs.forEach(yr=>{const v=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr).reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);rotRow.push(Math.round(v*100)/100);rotTotal+=v;});
    rotRow.push(Math.round(rotTotal*100)/100);rows.push(rotRow);
