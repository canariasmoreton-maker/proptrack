// ── TAB: PROYECCIONES ─────────────────────────────────────────────────────────
function TabProyecciones({prop,activeBK}){
  const bkP=prop==="all"?activeBK:activeBK.filter(b=>b[0]===prop);
  const hist=[2022,2023,2024,2025].map(y=>{const yb=bkP.filter(b=>b[9]===y);return{y,inc:yb.reduce((s,b)=>s+b[8],0)};}).filter(r=>r.inc>0);
  const lastInc=hist.length?hist[hist.length-1].inc:0;
  const remaining=Math.max(0,(prop==="all"?PRICE.LV+PRICE.EL:PRICE[prop])-(prop==="all"?EXCEL_TOTALS.total.beneficio:EXCEL_TOTALS[prop].beneficio));
  // Base: ADR y ocupación acumulada histórica de todos los años
  const allNts=bkP.reduce((s,b)=>s+b[6],0);
  const allInc=bkP.reduce((s,b)=>s+b[8],0);
  const baseADR=allNts?allInc/allNts:100;
  const baseOcuPct=Math.min(95,bkP.reduce((s,b)=>s+b[6],0)/avail(prop==="all"?"LV":prop,"all")*100);
  const avgResYear=Math.round(bkP.length/Math.max(1,new Set(bkP.map(b=>b[9])).size));
  // Escenarios: conservador = -10% ADR, base = tendencia actual, optimista = +10% ADR
  const sc=[
    {name:"Conservador",emoji:"🔵",desc:"ADR -10% vs histórico · ocupación igual",adrMult:0.90,ocuMult:1.0,col:"#60a5fa"},
    {name:"Base",emoji:"🟡",desc:"ADR y ocupación según histórico acumulado",adrMult:1.0,ocuMult:1.0,col:GOLD},
    {name:"Optimista",emoji:"🟢",desc:"ADR +10% vs histórico · ocupación igual",adrMult:1.10,ocuMult:1.0,col:GRN},
  ];
  const bens=sc.map(function(s){return [2026,2027,2028].map(function(y,yi){
    const projADR=baseADR*s.adrMult;
    const projOcu=(baseOcuPct*s.ocuMult)/100;
    const availDays=avail(prop==="all"?"LV":prop,String(y))||365;
    const inc=Math.round(projADR*projOcu*availDays);
    const nRes=Math.round(avgResYear*s.ocuMult);
    const opT=nRes*(prop==="all"?(OP.LV+OP.EL)/2:OP[prop]);
    const fix=6500*(prop==="all"?2:1);
    return{y,inc,ben:Math.round(inc-opT-fix),adr:Math.round(projADR),ocu:Math.round(baseOcuPct*s.ocuMult)};
  });});
  const pb=sc.map(function(_,si){const ab=bens[si][0].ben;return ab>0?(remaining/ab).toFixed(1):"N/D";});
  return <div>
    <div style={{fontSize:11,color:MUT,marginBottom:12}}>Proyección basada en tendencia histórica. Tres escenarios según ocupación.</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14}}>
      {sc.map(function(s,si){return <div key={s.name} style={{background:CARD,border:"1px solid "+s.col+"88",borderRadius:10,padding:"12px 14px",borderTop:"3px solid "+s.col}}>
        <div style={{fontSize:12,fontWeight:700,color:s.col,marginBottom:2}}>{s.emoji} {s.name}</div>
        <div style={{fontSize:10,color:MUT,marginBottom:8,lineHeight:1.4}}>{s.desc}</div>
        {bens[si].map(r=><div key={r.y} style={{padding:"4px 0",borderTop:`1px solid ${BD}`,display:"flex",justifyContent:"space-between",fontSize:11.5}}>
          <span style={{color:MUT}}>{r.y}</span>
          <span style={{color:s.col,fontWeight:600}}>Ing: {eur(r.inc)}</span>
          <span style={{color:r.ben>0?GRN:RED}}>Ben: {eur(r.ben)}</span>
        </div>)}
        <div style={{marginTop:8,padding:"6px 0",borderTop:`1px solid ${BD}`,fontSize:11}}>
          Payback estimado restante: <b style={{color:s.col}}>{pb[si]} años</b>
        </div>
      </div>;})}</div>
    <div style={{fontSize:11,fontWeight:700,color:MUT,textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>Histórico</div>
    <div style={{background:CARD,border:`1px solid ${BD}`,borderRadius:10,padding:"13px 15px"}}>
      <Bars data={hist.map(r=>({lbl:String(r.y),val:Math.round(r.inc)}))} keys={["val"]} colors={[prop==="EL"?TEAL_F:GOLD_F]} h={160}/>
    </div>
  </div>;
}

// ── TAB: SIMULADOR ────────────────────────────────────────────────────────────
function TabSimulador({prop,activeBK}){
  const sp=prop==="all"?"LV":prop;
  const bkP=activeBK.filter(b=>b[0]===sp);
  const pADR=bkP.reduce((s,b)=>s+b[8],0)/(bkP.reduce((s,b)=>s+b[6],0)||1);
  const pOcu=Math.min(100,bkP.reduce((s,b)=>s+b[6],0)/avail(sp,"all")*100);
  const avgN=bkP.length?bkP.reduce((s,b)=>s+b[6],0)/bkP.length:7;
  const [mode,setMode]=useState("price");
  const [adr,setAdr]=useState(Math.round(pADR)||100);
  const [ocu,setOcu]=useState(Math.round(pOcu)||60);
  const simInc=mode==="price"?(adr*(pOcu/100)*365):((ocu/100)*365*pADR);
  const simOp=(simInc/Math.max(pADR,1)/avgN)*OP[sp];
  const simFix=Object.values(FIXED[sp]||{}).reduce((s,v)=>s+v,0)/Math.max(Object.keys(FIXED[sp]||{}).length,1);
  const simBen=simInc-simOp-simFix;
  const baseInc=pADR*(pOcu/100)*365;
  const baseBen=baseInc-(baseInc/Math.max(pADR,1)/avgN)*OP[sp]-simFix;
  return <div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      <button onClick={()=>setMode("price")} style={{padding:"8px 14px",borderRadius:8,background:mode==="price"?GOLD+"22":"transparent",border:"1px solid "+(mode==="price"?GOLD:BD),color:mode==="price"?GOLD:MUT,cursor:"pointer"}}>💰 Subir ADR</button>
      <button onClick={()=>setMode("ocu")} style={{padding:"8px 14px",borderRadius:8,background:mode==="ocu"?TEAL+"22":"transparent",border:"1px solid "+(mode==="ocu"?TEAL:BD),color:mode==="ocu"?TEAL:MUT,cursor:"pointer"}}>📅 Objetivo ocupación</button>
    </div>
    <div style={{background:CARD,border:`1px solid ${BD}`,borderRadius:10,padding:"16px"}}>
      {mode==="price"?<div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12.5}}><span style={{color:MUT}}>ADR objetivo</span><span style={{color:GOLD,fontWeight:700,fontSize:16}}>{eur(adr)}</span></div>
        <input type="range" min={Math.max(50,Math.round(pADR*0.5))} max={Math.round(pADR*2)} value={adr} onChange={e=>setAdr(+e.target.value)} style={{width:"100%",accentColor:GOLD}}/>
        <div style={{fontSize:10,color:MUT,marginTop:2}}>Base actual: {eur(Math.round(pADR))}</div>
      </div>:<div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12.5}}><span style={{color:MUT}}>Ocupación objetivo</span><span style={{color:TEAL,fontWeight:700,fontSize:16}}>{ocu}%</span></div>
        <input type="range" min={30} max={95} value={ocu} onChange={e=>setOcu(+e.target.value)} style={{width:"100%",accentColor:TEAL}}/>
        <div style={{fontSize:10,color:MUT,marginTop:2}}>Base actual: {Math.round(pOcu)}%</div>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:14}}>
        {[["Ingresos proyect.",eur(Math.round(simInc)),GOLD],["Beneficio proyect.",eur(Math.round(simBen)),simBen>0?GRN:RED],["vs situación actual",(simBen>baseBen?"+":"")+eur(Math.round(simBen-baseBen)),simBen>baseBen?GRN:RED]].map(([l,v,col])=><div key={l} style={{background:SEC,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:10.5,color:MUT,marginBottom:4}}>{l}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:col}}>{v}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── TAB: HUÉSPEDES ────────────────────────────────────────────────────────────
function TabHuespedes({prop,year,activeBK}){
  const TODAY_H=new Date("2026-04-26");
  const normP=p=>{const m={"Espana":"España","España":"España","Galicia":"España","Las Palmas":"España","Canarias":"España","Barcelona":"España","Inglaterra":"Reino Unido","UK":"Reino Unido","Reino unido":"Reino Unido","Holanda":"Paises Bajos","Paises bajos":"Paises Bajos","Belgica":"Bélgica","Bruselas":"Bélgica","Hungria":"Hungría","EEUU":"Estados Unidos","Republica Checa":"Rep. Checa","Estonia":"Estonia"};return m[p]||p||"Desconocido";};
  // flag() usa FCODES que no cubre nombres normalizados (Hungría, Estados Unidos…) — extendemos localmente
  // Bandera como imagen (funciona en Windows donde los emoji de bandera no se renderizan)
  const XCODES={"Hungría":"HU","Estados Unidos":"US","Bélgica":"BE","Rep. Checa":"CZ","Paises Bajos":"NL","Luxemburgo":"LU","Lituania":"LT","Estonia":"EE","Gibraltar":"GI","Sudafrica":"ZA","Romania":"RO","Eslovenia":"SI","Islandia":"IS","Rusia":"RU","Australia":"AU","Canarias":"ES","Galicia":"ES","Las Palmas":"ES"};
  const hFlag=(nat,sz=20)=>{const code=(FCODES[nat]||XCODES[nat]||"").toLowerCase();if(!code)return null;const h=Math.round(sz*0.75);return <img src={`https://flagcdn.com/${sz}x${h}/${code}.png`} width={sz} height={h} style={{verticalAlign:"middle",borderRadius:2,flexShrink:0,display:"inline-block"}} alt={nat}/>;};

  // Personas lookup: BK by prop+fecha_entrada
  const paxMap=useMemo(()=>{const m={};(activeBK||BK).forEach(b=>{if(b[7])m[b[0]+b[4]]=b[7];});return m;},[activeBK]);

  // Enrich OCU_BK rows — [prop,plat,proc,fRes,ci,co,noches,year,month]
  const allByProp=useMemo(()=>OCU_BK.filter(b=>prop==="all"||b[0]===prop).map(b=>({
    prop:b[0],plat:b[1],proc:normP(b[2]),fRes:b[3],ci:b[4],co:b[5],noches:b[6],year:b[7],month:b[8],
    personas:paxMap[b[0]+b[4]]||2,
  })),[prop,paxMap]);

  const data=useMemo(()=>year==="all"?allByProp:allByProp.filter(b=>b.year===+year),[allByProp,year]);

  // Currently staying (prop filter, no year filter)
  const activeNow=useMemo(()=>allByProp.filter(b=>{const ci=new Date(b.ci),co=new Date(b.co);return ci<=TODAY_H&&co>TODAY_H;}),[allByProp]);

  const MSHUE=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const MLHUE=["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const fmtD=d=>{if(!d)return"";const p=d.split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;};

  // ── SECCIÓN 0 — Currently staying ──────────────────────────────────────────
  const stayingUI=activeNow.map((b,i)=>{
    const co=new Date(b.co);
    const nl=Math.ceil((co-TODAY_H)/86400000);
    const propLbl=b.prop==="LV"?"Las Vegas Golf":"Los Elefantes";
    const bkRow=(activeBK||BK).find(r=>r[0]===b.prop&&r[4]===b.ci);
    const ppn=bkRow&&bkRow[6]&&bkRow[7]?bkRow[8]/(bkRow[6]*bkRow[7]):null;
    return <div key={i} style={{background:"var(--brand)",borderRadius:10,padding:"16px 18px",marginBottom:10,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-28,right:-28,width:110,height:110,background:"rgba(255,255,255,.06)",borderRadius:"50%"}}/>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,position:"relative"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:"#4ade80",display:"inline-block",animation:"pulseLive 2s infinite",flexShrink:0}}/>
            <span style={{fontSize:10.5,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"rgba(255,255,255,.75)"}}>En casa ahora · {propLbl}</span>
          </div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#fff",marginBottom:3,display:"flex",alignItems:"center",gap:8}}>{hFlag(b.proc,24)} {b.proc}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.8)",marginBottom:9}}>Check-in {fmtD(b.ci)} · Check-out {fmtD(b.co)} · {b.noches} noches totales</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[["👥",b.personas+" pers."],["🌙",nl+" noches restantes"],ppn?["💶","€"+ppn.toFixed(2)+"/pers./noche"]:null].filter(Boolean).map(([ic,txt],j)=>(
              <span key={j} style={{background:"rgba(0,0,0,.22)",borderRadius:20,padding:"3px 10px",fontSize:11.5,color:"#fff"}}>{ic} {txt}</span>
            ))}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,color:"#fff",lineHeight:1}}>{nl}</div>
          <div style={{fontSize:10.5,color:"rgba(255,255,255,.72)",marginTop:2}}>noches rest.</div>
        </div>
      </div>
    </div>;
  });

  // ── KPIs ───────────────────────────────────────────────────────────────────
  const natCount=useMemo(()=>{const m={};data.forEach(b=>{m[b.proc]=(m[b.proc]||0)+1;});return m;},[data]);
  const topNat=useMemo(()=>Object.entries(natCount).sort((a,b)=>b[1]-a[1])[0]||null,[natCount]);
  const avgNoches=data.length?data.reduce((s,b)=>s+b.noches,0)/data.length:0;
  const avgPax=data.length?data.reduce((s,b)=>s+b.personas,0)/data.length:0;
  const withAnt=data.filter(b=>b.fRes&&b.fRes.trim()&&b.fRes!=="null");
  const avgAnt=withAnt.length?withAnt.reduce((s,b)=>s+Math.max(0,(new Date(b.ci)-new Date(b.fRes))/86400000),0)/withAnt.length:0;

  // ── Ranking nacionalidades ─────────────────────────────────────────────────
  const natRank=useMemo(()=>{
    const m={};data.forEach(b=>{if(!m[b.proc])m[b.proc]={res:0,noches:0};m[b.proc].res++;m[b.proc].noches+=b.noches;});
    return Object.entries(m).map(([nat,v])=>({nat,...v,media:v.noches/v.res})).sort((a,b)=>b.res-a.res).slice(0,10);
  },[data]);
  const maxRes=natRank[0]?.res||1;

  // ── Heatmap top 5 × 12 meses ───────────────────────────────────────────────
  const top5=natRank.slice(0,5).map(n=>n.nat);
  const hm=useMemo(()=>{const h={};top5.forEach(nat=>{h[nat]=new Array(12).fill(0);});data.forEach(b=>{if(h[b.proc])h[b.proc][b.month-1]++;});return h;},[data,top5.join()]);
  const heatStyle=v=>{
    if(v===0) return{bg:"var(--sec)",col:"var(--mut)",fw:400};
    if(v===1) return{bg:"#2A4A44",col:"#a8d4cc",fw:400};
    if(v<=3)  return{bg:"#4A7A72",col:"#d4ecea",fw:500};
    if(v<=6)  return{bg:"var(--brand)",col:"#fff",fw:600};
    return{bg:"var(--brand-dark)",col:"#fff",fw:700};
  };

  // ── Top 3 comportamiento ───────────────────────────────────────────────────
  const top3=useMemo(()=>natRank.slice(0,3).map(({nat})=>{
    const rows=data.filter(b=>b.proc===nat);
    const avgN=rows.reduce((s,b)=>s+b.noches,0)/rows.length;
    const avgP=rows.reduce((s,b)=>s+b.personas,0)/rows.length;
    const wa=rows.filter(b=>b.fRes&&b.fRes.trim()&&b.fRes!=="null");
    const avgA=wa.length?wa.reduce((s,b)=>s+Math.max(0,(new Date(b.ci)-new Date(b.fRes))/86400000),0)/wa.length:null;
    const mCnt={};rows.forEach(b=>{mCnt[b.month]=(mCnt[b.month]||0)+1;});
    const topM=Object.entries(mCnt).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([m])=>MSHUE[+m]);
    const bkRows=(activeBK||BK).filter(r=>(prop==="all"||r[0]===prop)&&normP(r[2])===nat);
    const ppnAvg=bkRows.length?bkRows.reduce((s,r)=>{const v=(r[6]&&r[7])?r[8]/(r[6]*r[7]):0;return s+v;},0)/bkRows.length:null;
    return{nat,reservas:rows.length,avgN,avgP,avgA,topM,ppnAvg};
  }),[natRank,data,activeBK,prop]);

  // ── Distribución por tamaño de grupo ──────────────────────────────────────
  const groupDist=useMemo(()=>{
    const total=data.length;if(!total)return[];
    const g={1:0,2:0,3:0,'4p':0};
    data.forEach(b=>{if(b.personas===1)g[1]++;else if(b.personas===2)g[2]++;else if(b.personas===3)g[3]++;else g['4p']++;});
    const mx=Math.max(...Object.values(g));
    return[{lbl:"1 persona",n:g[1]},{lbl:"2 personas",n:g[2]},{lbl:"3 personas",n:g[3]},{lbl:"4+ personas",n:g['4p']}]
      .map(r=>({...r,pct:total?r.n/total*100:0,barW:mx?r.n/mx*100:0}));
  },[data]);

  // ── Nivel 3 métricas de detalle ───────────────────────────────────────────
  const l3=useMemo(()=>{
    if(!data.length)return null;
    const maxStay=data.reduce((mx,b)=>b.noches>mx.noches?b:mx,data[0]);
    const wa2=data.filter(b=>b.fRes&&b.fRes.trim()&&b.fRes!=="null");
    const maxAntRow=wa2.length?wa2.reduce((mx,b)=>{const d=(new Date(b.ci)-new Date(b.fRes))/86400000;const md=(new Date(mx.ci)-new Date(mx.fRes))/86400000;return d>md?b:mx;},wa2[0]):null;
    const ppnByNat={};
    (activeBK||BK).filter(r=>prop==="all"||r[0]===prop).filter(r=>year==="all"||r[9]===+year).forEach(r=>{const nat=normP(r[2]);if(!ppnByNat[nat])ppnByNat[nat]=[];if(r[6]&&r[7])ppnByNat[nat].push(r[8]/(r[6]*r[7]));});
    const profitable=Object.entries(ppnByNat).filter(([_,v])=>v.length>=2).map(([nat,v])=>({nat,avg:v.reduce((s,x)=>s+x,0)/v.length})).sort((a,b)=>b.avg-a.avg)[0]||null;
    const mNat={};data.forEach(b=>{if(!mNat[b.month])mNat[b.month]=new Set();mNat[b.month].add(b.proc);});
    const diverseM=Object.entries(mNat).sort((a,b)=>b[1].size-a[1].size)[0]||null;
    const countries=new Set(data.map(b=>b.proc)).size;
    return{maxStay,maxAntRow,profitable,diverseM,countries};
  },[data,activeBK,prop,year]);

  const ST=(txt)=><div style={{fontSize:10.5,color:MUT,textTransform:"uppercase",letterSpacing:".08em",fontWeight:600,marginBottom:8,marginTop:18}}>{txt}</div>;

  if(!data.length) return <div style={{color:MUT,padding:"32px 0",textAlign:"center",fontSize:13}}>Sin datos para el período seleccionado.</div>;

  return <div>
    <style>{`@keyframes pulseLive{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.4)}}`}</style>

    {/* 0 — Currently staying */}
    {activeNow.length>0&&<div style={{marginBottom:4}}>{stayingUI}</div>}

    {/* 1 — KPIs */}
    {ST("Resumen histórico")}
    <div style={{...c.grid("repeat(4,1fr)"),marginBottom:4}}>
      <div style={c.card}>
        <div style={c.lbl}>Nac. más frecuente</div>
        <div style={{fontSize:14,fontWeight:700,color:TXT,marginTop:4,lineHeight:1.4,display:"flex",alignItems:"center",gap:6}}>{topNat?<>{hFlag(topNat[0])} {topNat[0]}</>:"—"}</div>
        <div style={c.desc}>{topNat?.[1]||0} reservas históricas</div>
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Duración media</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22}}>{avgNoches.toFixed(1)}</span><span style={{fontSize:11,color:MUT,marginLeft:3}}>noches</span></div>
        <div style={c.desc}>media histórica</div>
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Grupo medio</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22}}>{avgPax.toFixed(1)}</span><span style={{fontSize:11,color:MUT,marginLeft:3}}>personas</span></div>
        <div style={c.desc}>media histórica</div>
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Antelación media</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22}}>{Math.round(avgAnt)}</span><span style={{fontSize:11,color:MUT,marginLeft:3}}>días</span></div>
        <div style={c.desc}>basado en {withAnt.length} reservas con fecha</div>
      </div>
    </div>

    {/* 2A — Ranking */}
    {ST("Ranking de nacionalidades")}
    <div style={{...c.card,padding:"12px 14px",marginBottom:4}}>
      {natRank.map((n,i)=>(
        <div key={n.nat} style={{display:"grid",gridTemplateColumns:"130px 1fr 56px 52px 46px",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<natRank.length-1?`1px solid ${BD}`:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:7,fontSize:12.5,fontWeight:500}}>
            {hFlag(n.nat)}<span>{n.nat}</span>
          </div>
          <div style={{height:5,background:"var(--sec)",borderRadius:3,overflow:"hidden"}}>
            <div style={{width:`${(n.res/maxRes*100).toFixed(1)}%`,height:"100%",background:"var(--brand)",borderRadius:3,transition:"width .5s ease"}}/>
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,textAlign:"right",color:TXT}}>{n.res}<span style={{color:MUT,fontSize:10}}> res</span></div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,textAlign:"right",color:MUT}}>{n.noches}n</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,textAlign:"right",color:MUT}}>{n.media.toFixed(1)}d</div>
        </div>
      ))}
      <div style={{fontSize:10.5,color:MUT,marginTop:8,fontStyle:"italic"}}>Ordenado por número de reservas históricas.</div>
    </div>

    {/* 2B — Heatmap */}
    {ST("¿Cuándo viene cada nacionalidad? · Top 5 × 12 meses")}
    <div style={{...c.card,padding:"12px 14px",marginBottom:4,overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",minWidth:560,fontSize:11.5}}>
        <thead>
          <tr>
            <th style={{textAlign:"left",padding:"4px 6px 8px 0",color:MUT,fontWeight:500,fontSize:11,minWidth:110}}>Nacionalidad</th>
            {MSHUE.slice(1).map(m=><th key={m} style={{textAlign:"center",padding:"4px 2px 8px",color:MUT,fontWeight:500,fontSize:11,minWidth:36}}>{m}</th>)}
          </tr>
        </thead>
        <tbody>
          {top5.map(nat=>(
            <tr key={nat}>
              <td style={{padding:"3px 4px 3px 0",fontWeight:500,fontSize:12,whiteSpace:"nowrap",color:TXT}}>{hFlag(nat)} {nat}</td>
              {(hm[nat]||[]).map((v,mi)=>{const{bg,col,fw}=heatStyle(v);return <td key={mi} style={{textAlign:"center",padding:"5px 2px",background:bg,color:col,fontWeight:fw,fontFamily:"'DM Mono',monospace",fontSize:11,borderRadius:4,border:"2px solid var(--bg)"}}>{v>0?v:""}</td>;})}
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{fontSize:10.5,color:MUT,marginTop:8,fontStyle:"italic"}}>Número de reservas históricas por mes. Intensidad = volumen.</div>
    </div>

    {/* 2C — Top 3 comportamiento */}
    {ST("Comportamiento por nacionalidad · Top 3")}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:4}}>
      {top3.map((d,i)=>(
        <div key={d.nat} style={{background:"var(--sec)",border:`1px solid ${BD}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${BD}`}}>
            <span style={{flexShrink:0}}>{hFlag(d.nat,24)}</span>
            <div><div style={{fontWeight:700,fontSize:13}}>{d.nat}</div><div style={{fontSize:10.5,color:MUT}}>#{i+1} · {d.reservas} reservas</div></div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,fontSize:12}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:MUT}}>Duración media</span><span style={{fontFamily:"'DM Mono',monospace"}}>{d.avgN.toFixed(1)} noches</span></div>
            {d.ppnAvg!==null&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:MUT}}>€/pers./noche</span><span style={{fontFamily:"'DM Mono',monospace"}}>€{d.ppnAvg.toFixed(2)}</span></div>}
            {d.avgA!==null&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:MUT}}>Antelación media</span><span style={{fontFamily:"'DM Mono',monospace"}}>{Math.round(d.avgA)} días</span></div>}
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:MUT}}>Grupo medio</span><span style={{fontFamily:"'DM Mono',monospace"}}>{d.avgP.toFixed(1)} pers.</span></div>
          </div>
          {d.topM.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${BD}`,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10.5,color:MUT,marginRight:2}}>Meses típicos:</span>
            {d.topM.map(m=><span key={m} style={{fontSize:10.5,padding:"2px 7px",borderRadius:4,background:"var(--brand)22",color:"var(--brand-light)",border:"1px solid var(--brand)44"}}>{m}</span>)}
          </div>}
        </div>
      ))}
    </div>

    {/* 2D — Grupo */}
    {ST("Distribución por tamaño de grupo")}
    <div style={{...c.card,padding:"14px 16px",marginBottom:4,maxWidth:520}}>
      {groupDist.map(g=>(
        <div key={g.lbl} style={{display:"grid",gridTemplateColumns:"90px 1fr 50px",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{fontSize:12.5}}>{g.lbl}</div>
          <div style={{height:7,background:"var(--sec)",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${g.barW.toFixed(1)}%`,height:"100%",background:"var(--acc)",borderRadius:4,transition:"width .5s ease"}}/>
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:11.5,textAlign:"right",color:MUT}}>{g.pct.toFixed(1)}%</div>
        </div>
      ))}
      <div style={{fontSize:10.5,color:MUT,marginTop:4,fontStyle:"italic"}}>Basado en todas las reservas históricas.</div>
    </div>

    {/* 3 — Detalle */}
    {ST("Métricas de detalle")}
    {l3&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
      <div style={c.card}>
        <div style={c.lbl}>Estancia más larga</div>
        <div style={{...c.big("var(--acc)"),fontSize:20}}>{l3.maxStay.noches}<span style={{fontSize:11,color:MUT,fontFamily:"'DM Sans',sans-serif"}}> noches</span></div>
        <div style={{...c.desc,display:"flex",alignItems:"center",gap:5,marginTop:3}}>{hFlag(l3.maxStay.proc)}<span>{l3.maxStay.proc} · {MLHUE[l3.maxStay.month]} {l3.maxStay.year}</span></div>
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Mayor antelación</div>
        {l3.maxAntRow?<>
          <div style={{...c.big("var(--brand)"),fontSize:20}}>{Math.round((new Date(l3.maxAntRow.ci)-new Date(l3.maxAntRow.fRes))/86400000)}<span style={{fontSize:11,color:MUT,fontFamily:"'DM Sans',sans-serif"}}> días</span></div>
          <div style={{...c.desc,display:"flex",alignItems:"center",gap:5,marginTop:3}}>{hFlag(l3.maxAntRow.proc)}<span>{l3.maxAntRow.proc} · {MLHUE[l3.maxAntRow.month]} {l3.maxAntRow.year}</span></div>
        </>:<div style={c.desc}>Sin fechas de reserva registradas</div>}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Nac. más rentable</div>
        {l3.profitable?<>
          <div style={{fontSize:13,fontWeight:700,color:TXT,marginTop:4,display:"flex",alignItems:"center",gap:6}}>{hFlag(l3.profitable.nat)}<span>{l3.profitable.nat}</span></div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:16,color:"var(--pos)",marginTop:2}}>€{l3.profitable.avg.toFixed(2)}/pers./noche</div>
        </>:<div style={c.desc}>Sin datos suficientes</div>}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Nac. más fiel</div>
        {topNat&&<><div style={{fontSize:13,fontWeight:700,color:TXT,marginTop:4,display:"flex",alignItems:"center",gap:6}}>{hFlag(topNat[0])}<span>{topNat[0]}</span></div><div style={c.desc}>{topNat[1]} reservas históricas</div></>}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Mes con más diversidad</div>
        {l3.diverseM?<>
          <div style={{...c.big("var(--brand-light)"),fontSize:18}}>{MLHUE[+l3.diverseM[0]]}</div>
          <div style={c.desc}>{l3.diverseM[1].size} procedencias distintas</div>
        </>:null}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Países distintos</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22}}>{l3.countries}</span></div>
        <div style={c.desc}>procedencias únicas · histórico completo</div>
      </div>
    </div>}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("pt_theme")||"dark";}catch(e){return "dark";}});
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);try{localStorage.setItem("pt_theme",theme);}catch(e){}},[theme]);

  // prop="all" → Mi Patrimonio vista global; prop="LV"/"EL" → propiedad seleccionada
  const [prop,setProp]=useState("all");
  const [year,setYear]=useState("all");
  const [l2tab,setL2tab]=useState("ing"); // tab activo en Nivel 2

  // Dropdowns abiertos/cerrados
  const [propOpen,setPropOpen]=useState(false);
  const [navOpen,setNavOpen]=useState(false);
  const [yearOpen,setYearOpen]=useState(false);

  const [ex,setEx]=useState(()=>lsGet("pt_ex",[]));
  const [bkData,setBkData]=useState(()=>lsGet('pt_bk_cache',null)||BK);
  const [status,setStatus]=useState("idle");
  const [cancelled,setCancelled]=useState(()=>lsGet("pt_cancelled",{}));
  const [chks,setChks]=useState(()=>lsGet("pt_chks",{}));

  const cancelBk=(key,b)=>{
    if(!window.confirm("Marcar esta reserva como CANCELADA?")) return;
    const nc={...cancelled,[key]:true};setCancelled(nc);lsSet("pt_cancelled",nc);
    callWebhook({action:"cancel_booking",prop:b[0],checkin:b[4],checkin_fmt:fDate(b[4]),name:b[3]||b[2],sheet:b[0]==="LV"?"Las Vegas alquileres":"Elefantes alquileres",clear_cols:"G:Y",concepto:"CANCELADA - "+(b[3]||b[2])});
    showToast("Reserva cancelada",RED_F);
  };
  const uncancelBk=(key)=>{const nc={...cancelled};delete nc[key];setCancelled(nc);lsSet("pt_cancelled",nc);showToast("Cancelaci\xf3n deshecha",GOLD);};
  const activeBK=useMemo(()=>bkData.filter(b=>!cancelled[bkKey(b)]),[cancelled,bkData]);

  useEffect(()=>{
    lsSet('pt_gids',{lv:"842860483",el:"38273930"});
    loadLiveData(setStatus,d=>setBkData(d),setChks,lsGet("pt_cancelled",{}));
    const iv=setInterval(()=>loadLiveData(setStatus,d=>setBkData(d),setChks,lsGet("pt_cancelled",{})),5*60*1000);
    return ()=>clearInterval(iv);
  },[]);

  // Cerrar dropdowns al hacer clic fuera
  useEffect(()=>{
    const fn=()=>{setPropOpen(false);setYearOpen(false);};
    document.addEventListener("click",fn);
    return ()=>document.removeEventListener("click",fn);
  },[]);

  const isPatrimonio=prop==="all";

  // Propiedades disponibles (dinámico desde datos)
  const availProps=useMemo(()=>[...new Set(bkData.map(b=>b[0]))].sort().map(p=>({
    id:p,
    name:p==="LV"?"Las Vegas Golf":p==="EL"?"Los Elefantes":p
  })),[bkData]);

  // Años disponibles (dinámico desde datos)
  const availYears=useMemo(()=>["all",...Array.from(new Set(bkData.map(b=>String(b[9])))).sort()],[bkData]);

  // Etiquetas para los botones dropdown
  const propLabel=isPatrimonio?"Propiedades":(prop==="LV"?"Las Vegas Golf":prop==="EL"?"Los Elefantes":prop);
  const yearLabel=year==="all"?"A\xf1o":year;


  // Navegar a propiedad — preserva tab activo entre propiedades; solo resetea a "ing" desde Mi Patrimonio
  const goToProp=(p,tab)=>{
    const keepTab=tab||(prop!=="all"?l2tab:"ing");
    setProp(p);setL2tab(keepTab);setPropOpen(false);
  };


  // Tabs Nivel 2
  const L2TABS=[
    {id:"ocu",lbl:"Ocupaci\xf3n"},
    {id:"ing",lbl:"Ingresos"},
    {id:"gas",lbl:"Gastos"},
    {id:"res",lbl:"Reservas"},
    {id:"hue",lbl:"Hu\xe9spedes"},
    {id:"imp",lbl:"Impuestos"},
    {id:"eka",lbl:"Servicios"},
  ];

  // Estilos de botones dropdown según estado
  const ddBtnStyle=(isActive,isDisabled)=>({
    padding:"6px 14px",
    borderRadius:20,
    border:`1px solid ${isActive?"var(--brand)":BD}`,
    background:isActive?"var(--brand)20":"transparent",
    color:isActive?"var(--brand-light)":MUT,
    cursor:"pointer",
    fontSize:12.5,
    fontWeight:isActive?600:400,
    whiteSpace:"nowrap",
    opacity:isDisabled?0.4:1,
    transition:"opacity .2s,border-color .2s,color .2s",
    outline:"none",
    display:"flex",
    alignItems:"center",
    gap:5,
  });

  return (
    <div style={{background:BG,minHeight:"100vh",color:TXT,fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>

      {/* ───── NIVEL 1 — BARRA DE NAVEGACIÓN PRINCIPAL ───── */}
      <div style={{
        background:SEC,borderBottom:`1px solid ${BD}`,
        padding:"8px 16px",
        display:"flex",alignItems:"center",gap:8,
        position:"sticky",top:0,zIndex:20,
        flexWrap:"wrap",
      }}>

        {/* Logo */}
        <div style={c.logo}>PropTrack</div>

        {/* Hamburger button (mobile) */}
        <button
          className="ham-btn"
          onClick={()=>setNavOpen(o=>!o)}
          style={{display:"none",marginLeft:"auto",background:"transparent",border:`1px solid ${BD}`,borderRadius:7,padding:"5px 9px",color:MUT,cursor:"pointer",fontSize:16,flexShrink:0}}>
          {navOpen?"✕":"☰"}
        </button>

        {/* Desktop nav items */}
        <div className="nav-desktop-items" style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {/* Separador visual */}
          <div style={{width:1,height:18,background:BD,marginLeft:2,marginRight:2,flexShrink:0}}/>

          {/* Botón Mi Patrimonio */}
          <button
            onClick={()=>{setProp("all");setPropOpen(false);setYearOpen(false);}}
            style={{
              padding:"6px 16px",borderRadius:20,border:"none",outline:"none",
              cursor:"pointer",fontSize:12.5,fontWeight:600,whiteSpace:"nowrap",
              background:isPatrimonio?"var(--brand)":"transparent",
              color:isPatrimonio?"#ffffff":MUT,
              boxShadow:isPatrimonio?"0 2px 10px var(--brand)55":"none",
              transition:"background .2s,color .2s,box-shadow .2s",
            }}>
            Mi Patrimonio
          </button>

          {/* Dropdown: Propiedades */}
          <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button
              onClick={()=>{setPropOpen(o=>!o);setYearOpen(false);}}
              style={ddBtnStyle(!isPatrimonio,isPatrimonio)}>
              {propLabel}
              <span style={{fontSize:9,opacity:.7,marginTop:1}}>▾</span>
            </button>
            {propOpen&&(
              <div style={{
                position:"absolute",top:"calc(100% + 6px)",left:0,
                background:CARD,border:`1px solid ${BD}`,borderRadius:10,
                zIndex:200,minWidth:175,
                boxShadow:"0 8px 28px rgba(0,0,0,.45)",
                overflow:"hidden",
              }}>
                {availProps.map(p=>(
                  <div
                    key={p.id}
                    onClick={()=>goToProp(p.id)}
                    style={{
                      padding:"10px 15px",cursor:"pointer",fontSize:12.5,
                      color:prop===p.id?"var(--brand)":TXT,
                      background:prop===p.id?"var(--brand)18":"transparent",
                      fontWeight:prop===p.id?600:400,
                      transition:"background .15s",
                    }}>
                    {p.name}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Dropdown: Año */}
          <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button
              onClick={()=>{setYearOpen(o=>!o);setPropOpen(false);}}
              style={ddBtnStyle(year!=="all",isPatrimonio)}>
              {yearLabel}
              <span style={{fontSize:9,opacity:.7,marginTop:1}}>▾</span>
            </button>
            {yearOpen&&(
              <div style={{
                position:"absolute",top:"calc(100% + 6px)",left:0,
                background:CARD,border:`1px solid ${BD}`,borderRadius:10,
                zIndex:200,minWidth:120,
                boxShadow:"0 8px 28px rgba(0,0,0,.45)",
                overflow:"hidden",maxHeight:260,overflowY:"auto",
              }}>
                {availYears.map(y=>(
                  <div
                    key={y}
                    onClick={()=>{setYear(y);setYearOpen(false);}}
                    style={{
                      padding:"10px 15px",cursor:"pointer",fontSize:12.5,
                      color:year===y?"var(--brand)":TXT,
                      background:year===y?"var(--brand)18":"transparent",
                      fontWeight:year===y?600:400,
                      transition:"background .15s",
                    }}>
                    {y==="all"?"Todos":y}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Acciones — derecha (desktop) */}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {status==="loading"&&<span style={{fontSize:10.5,color:MUT}}>Actualizando...</span>}
            {status==="ok"&&<span style={{fontSize:10.5,color:GRN}}>● Datos en vivo</span>}
            {status==="error"&&<span style={{fontSize:10.5,color:MUT,cursor:"pointer"}} title="Error cargando Sheet">Datos locales ⚠</span>}
            <button
              onClick={()=>{lsSet("pt_bk_ts",0);loadLiveData(setStatus,d=>setBkData(d),setChks);}}
              style={{padding:"5px 10px",borderRadius:14,background:"transparent",border:`1px solid ${BD}`,color:MUT,fontSize:11,cursor:"pointer",outline:"none"}}>
              ↻
            </button>
            <button
              onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}
              title="Cambiar tema"
              style={{padding:"5px 9px",borderRadius:14,background:"transparent",border:`1px solid ${BD}`,color:MUT,fontSize:14,cursor:"pointer",outline:"none"}}>
              {theme==="dark"?"☀️":"🌙"}
            </button>
            <button
              onClick={()=>{window.open(GFORM,"_blank");setTimeout(()=>{loadLiveData(setStatus,d=>setBkData(d),setChks,lsGet("pt_cancelled",{}));showToast("Datos actualizados desde Google Sheets",TEAL_F);},12000);}}
              style={{padding:"6px 15px",borderRadius:20,background:"var(--acc)",color:"#0D0D0D",fontSize:12,fontWeight:700,cursor:"pointer",border:"none",outline:"none",whiteSpace:"nowrap",boxShadow:"0 2px 8px var(--acc)44"}}>
              + Nueva Reserva
            </button>
          </div>
        </div>
        {/* Mobile menu (hamburger open) */}
        {navOpen&&<div style={{width:"100%",borderTop:`1px solid ${BD}`,paddingTop:10,paddingBottom:6,display:"flex",flexDirection:"column",gap:6}}>
          <button onClick={()=>{setProp("all");setPropOpen(false);setNavOpen(false);}} style={{padding:"10px 14px",borderRadius:8,border:"none",background:isPatrimonio?"var(--brand)20":"transparent",color:isPatrimonio?"var(--brand)":TXT,textAlign:"left",fontSize:13,cursor:"pointer",fontWeight:isPatrimonio?600:400}}>🏠 Mi Patrimonio</button>
          {availProps.map(p=><button key={p.id} onClick={()=>{goToProp(p.id);setNavOpen(false);}} style={{padding:"10px 14px",borderRadius:8,border:"none",background:prop===p.id?"var(--brand)20":"transparent",color:prop===p.id?"var(--brand)":TXT,textAlign:"left",fontSize:13,cursor:"pointer",fontWeight:prop===p.id?600:400}}>{p.name}</button>)}
          <div style={{height:1,background:BD,margin:"4px 0"}}/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"4px 0"}}>
            {availYears.map(y=><button key={y} onClick={()=>{setYear(y);setNavOpen(false);}} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${year===y?"var(--brand)":BD}`,background:year===y?"var(--brand)20":"transparent",color:year===y?"var(--brand)":MUT,fontSize:11.5,cursor:"pointer"}}>{y==="all"?"Todos":y}</button>)}
          </div>
          <div style={{display:"flex",gap:6,padding:"4px 0"}}>
            <button onClick={()=>{lsSet("pt_bk_ts",0);loadLiveData(setStatus,d=>setBkData(d),setChks);}} style={{padding:"6px 12px",borderRadius:14,background:"transparent",border:`1px solid ${BD}`,color:MUT,fontSize:11.5,cursor:"pointer"}}>↻ Actualizar</button>
            <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{padding:"6px 12px",borderRadius:14,background:"transparent",border:`1px solid ${BD}`,color:MUT,fontSize:14,cursor:"pointer"}}>{theme==="dark"?"☀️":"🌙"}</button>
            <button onClick={()=>window.open(GFORM,"_blank")} style={{padding:"6px 14px",borderRadius:20,background:"var(--acc)",color:"#0D0D0D",fontSize:12,fontWeight:700,cursor:"pointer",border:"none"}}>+ Nueva Reserva</button>
          </div>
        </div>}
      </div>

      {/* ───── NIVEL 2 — TABS DE PROPIEDAD (solo cuando hay propiedad seleccionada) ───── */}
      {!isPatrimonio&&(
        <div style={{
          background:CARD,
          borderBottom:`1px solid ${BD}`,
          padding:"0 16px",
          display:"flex",gap:0,
          overflowX:"auto",
        }}>
          {/* Etiqueta contextual */}
          <div style={{
            display:"flex",alignItems:"center",
            paddingRight:16,
            borderRight:`1px solid ${BD}`,
            marginRight:8,
            fontSize:11.5,
            color:"var(--brand)",
            fontWeight:600,
            whiteSpace:"nowrap",
            flexShrink:0,
          }}>
            {prop==="LV"?"Las Vegas Golf":prop==="EL"?"Los Elefantes":prop}
            {year!=="all"&&<span style={{color:MUT,fontWeight:400,marginLeft:6}}>· {year}</span>}
          </div>
          {L2TABS.map(t=>(
            <button
              key={t.id}
              onClick={()=>setL2tab(t.id)}
              style={{
                padding:"10px 16px",
                background:"none",border:"none",outline:"none",
                cursor:"pointer",
                borderBottom:l2tab===t.id?`2px solid var(--brand)`:"2px solid transparent",
                color:l2tab===t.id?"var(--brand)":MUT,
                fontSize:12.5,
                fontWeight:l2tab===t.id?600:400,
                whiteSpace:"nowrap",
                marginBottom:-1,
                transition:"color .15s,border-color .15s",
              }}>
              {t.lbl}
            </button>
          ))}
        </div>
      )}

      {/* ───── CONTENIDO ───── */}
      <div style={{padding:"14px 16px",maxWidth:1100}}>
        {isPatrimonio&&<TabInv prop="all" ex={ex} activeBK={activeBK} onSelectProp={goToProp}/>}
        {!isPatrimonio&&l2tab==="ing"&&<TabIng prop={prop} year={year} ex={ex} activeBK={activeBK}/>}
        {!isPatrimonio&&l2tab==="ocu"&&<TabHue prop={prop} year={year}/>}
        {!isPatrimonio&&l2tab==="gas"&&<TabGastos prop={prop} year={year} ex={ex} setEx={setEx} activeBK={activeBK}/>}
        {!isPatrimonio&&l2tab==="res"&&<TabProx prop={prop} year={year} activeBK={activeBK} cancelled={cancelled} cancelBk={cancelBk} uncancelBk={uncancelBk} chks={chks} setChks={setChks}/>}
        {!isPatrimonio&&l2tab==="hue"&&<TabHuespedes prop={prop} year={year} activeBK={activeBK}/>}
        {!isPatrimonio&&l2tab==="imp"&&<TabImpuestos activeBK={activeBK}/>}
        {!isPatrimonio&&l2tab==="eka"&&<TabServiciosEka/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
