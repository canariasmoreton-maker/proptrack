const du=d=>{const diff=new Date(d)-TODAY;return Math.ceil(diff/864e5);};

function filtBk(p,y,src){return (src||BK).filter(b=>(p==="all"||b[0]===p)&&(y==="all"||b[9]===+y));}
function avail(p,y){
  if(y==="all"){if(p==="all") return Object.values(AVDAYS.LV).reduce((a,b)=>a+b,0)+Object.values(AVDAYS.EL).reduce((a,b)=>a+b,0);return Object.values(AVDAYS[p]||{}).reduce((a,b)=>a+b,0);}
  if(p==="all") return (AVDAYS.LV[+y]||0)+(AVDAYS.EL[+y]||0);return (AVDAYS[p]||{})[+y]||365;
}
function fixedTot(p,y,ex){
  const ps=p==="all"?["LV","EL"]:[p];
  const base=ps.reduce((s,pp)=>{const f=FIXED[pp]||{};return s+(y==="all"?Object.values(f).reduce((a,b)=>a+b,0):(f[+y]||0));},0);
  return base+(ex||[]).filter(e=>p==="all"||e.prop===p).filter(e=>y==="all"||e.year===+y).reduce((s,e)=>s+e.amount,0);
}
function kpis(bk,p,y,ex){
  const inc=bk.reduce((s,b)=>s+b[8],0),nts=bk.reduce((s,b)=>s+b[6],0),n=bk.length;
  const op=p==="LV"?OP.LV:p==="EL"?OP.EL:(OP.LV+OP.EL)/2;
  const opT=n*op,fix=fixedTot(p,y,ex),av=avail(p,y);
  return{inc,nts,n,opT,fix,ben:inc-opT-fix,adr:nts?inc/nts:0,revpar:av?inc/av:0,alos:n?nts/n:0,ocu:av?Math.min(100,nts/av*100):0};
}
function roi(p,ex,bkData){
  const src=bkData||BK;
  const bk=src.filter(b=>b[0]===p),inc=bk.reduce((s,b)=>s+b[8],0),nts=bk.reduce((s,b)=>s+b[6],0);
  const opT=bk.length*OP[p],fix=fixedTot(p,"all",ex),ben=inc-opT-fix;
  const yrs=p==="LV"?4.5:1.75,roiA=(ben/PRICE[p]*100)/yrs,annB=ben/yrs;
  const pb=annB>0?Math.max(0,(PRICE[p]-ben)/annB):99,ocu=Math.min(100,nts/avail(p,"all")*100);
  const rP=roiA<5?10:roiA<8?20:roiA<12?30:40,oP=ocu<50?5:ocu<65?10:ocu<75?20:30,pP=pb>15?5:pb>10?10:pb>7?20:30;
  return{inc,ben,opT,fix,roiA,pb,ocu,score:rP+oP+pP,recup:Math.max(0,ben/PRICE[p]*100)};
}
const slbl=s=>s<=40?"Revisar estrategia":s<=65?"Rentabilidad moderada":s<=85?"Buena inversion":"Inversion excelente";

// ── SVG CHARTS WITH TOOLTIPS ─────────────────────────────────────────────────
function Bars({data,keys,colors,h=160,fmtY}){
  const [tip,setTip]=useState(null);
  const W=500,H=h,PL=42,PB=22,PT=8,PR=6,cW=W-PL-PR,cH=H-PB-PT;
  const maxV=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)),1);
  const slotW=cW/data.length,bW=Math.max(6,slotW*(keys.length===1?0.55:0.38));
  const totalBW=bW*keys.length+(keys.length-1)*2;
  const fY=fmtY||(v=>v>=1000?num(Math.round(v/1000))+"k":num(Math.round(v)));
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-30}}>{tip.label}: {tip.val}</div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}} onMouseLeave={()=>setTip(null)}>
      {[0,.25,.5,.75,1].map(r=>{const y=PT+cH*(1-r);return <g key={r}><line x1={PL} x2={W-PR} y1={y} y2={y} stroke={"var(--chart-grid)"} strokeWidth={0.5}/><text x={PL-3} y={y+4} textAnchor="end" fill={MUT} fontSize={9}>{fY(maxV*r)}</text></g>;})}
      {data.map((d,di)=>{
        const sX=PL+di*slotW,bSX=sX+(slotW-totalBW)/2;
        return <g key={di}>
          {keys.map((k,ki)=>{const val=d[k]||0;const bH=Math.max(2,(val/maxV)*cH);const x=bSX+ki*(bW+2);const y=PT+cH-bH;
            return <rect key={ki} x={x} y={y} width={bW} height={bH} fill={colors[ki]||GOLD_F} rx={2}
              onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,label:k,val:eur(val)})}
              style={{cursor:"crosshair"}}/>;
          })}
          <text x={sX+slotW/2} y={H-5} textAnchor="middle" fill={MUT} fontSize={9}>{d.lbl}</text>
        </g>;
      })}
    </svg>
  </div>;
}

function Donut({data,sz=110}){
  const [tip,setTip]=useState(null);
  const total=data.reduce((s,d)=>s+d.v,0)||1,cx=sz/2,cy=sz/2,r=sz*0.37,ri=sz*0.22;
  let a=-Math.PI/2;
  const slices=data.map(d=>{
    const sw=(d.v/total)*2*Math.PI,x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a+sw),y2=cy+r*Math.sin(a+sw);
    const xi1=cx+ri*Math.cos(a),yi1=cy+ri*Math.sin(a),xi2=cx+ri*Math.cos(a+sw),yi2=cy+ri*Math.sin(a+sw);
    const lg=sw>Math.PI?1:0,path=`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1} Z`;
    a+=sw;return{path,fill:d.col,n:d.n,v:d.v};
  });
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-30}}>{tip.n}: {eur(tip.v)}</div>}
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`} onMouseLeave={()=>setTip(null)}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.fill} style={{cursor:"crosshair"}} onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,n:s.n,v:s.v})}/>)}
    </svg>
  </div>;
}


function LineChart({data,keys,colors,h}){
  h=h||160;
  const [tip,setTip]=useState(null);
  const W=500,H=h,PL=48,PB=22,PT=8,PR=8,cW=W-PL-PR,cH=H-PB-PT;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max.apply(null,allV.concat([1]));
  const xS=cW/(Math.max(data.length-1,1));
  const px=function(i){return PL+i*xS;};
  const py=function(v){return PT+cH*(1-v/maxV);};
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-30}}>{tip.lbl}: {eur(tip.v)}</div>}
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:H}} onMouseLeave={()=>setTip(null)}>
      {[0,.25,.5,.75,1].map(function(r){var y=PT+cH*(1-r);return <g key={r}><line x1={PL} x2={W-PR} y1={y} y2={y} stroke="var(--chart-grid)" strokeWidth={0.5}/><text x={PL-3} y={y+4} textAnchor="end" fill="#7a8fa6" fontSize={9}>{y>=1000?num(Math.round(y/1000))+"k":num(Math.round(maxV*r))}</text></g>;})}
      {keys.map(function(k,ki){
        var pts=data.map(function(d,i){return {x:px(i),y:py(d[k]||0),v:d[k]||0,l:d.lbl};});
        var path="M"+pts.map(function(p){return p.x+","+p.y;}).join(" L");
        return <g key={k}>
          <path d={path} fill="none" stroke={colors[ki]||GOLD_F} strokeWidth={2} strokeLinejoin="round"/>
          {pts.map(function(p,i){return <circle key={i} cx={p.x} cy={p.y} r={3.5} fill={colors[ki]||GOLD_F} style={{cursor:"crosshair"}} onMouseEnter={function(e){setTip({x:e.clientX,y:e.clientY,lbl:k+" "+p.l,v:p.v});}}/>;})}
        </g>;
      })}
      {data.map(function(d,i){return <text key={i} x={px(i)} y={H-5} textAnchor="middle" fill="#7a8fa6" fontSize={9}>{d.lbl}</text>;})}
    </svg>
  </div>;
}

function Gauge({sc,col}){
  const r=44,cx=68,cy=60,rad=d=>d*Math.PI/180;
  const arc=(sa,sw)=>{const s=rad(sa),e=rad(sa+sw),x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);return `M${x1},${y1} A${r},${r} 0 ${sw>180?1:0} 1 ${x2},${y2}`;};
  return <svg width={136} height={88} viewBox="0 0 136 88">
    <path d={arc(-210,240)} fill="none" stroke={BD} strokeWidth={7} strokeLinecap="round"/>
    {sc>0&&<path d={arc(-210,240*sc/100)} fill="none" stroke={col} strokeWidth={7} strokeLinecap="round"/>}
    <text x={cx} y={cx+5} textAnchor="middle" fill={col} fontSize={21} fontFamily="Playfair Display" fontWeight="700">{sc}</text>
    <text x={cx} y={cx+16} textAnchor="middle" fill={MUT} fontSize={9}>/ 100</text>
  </svg>;
}

// RevPAR denominator helpers (same logic as ocupación)
function ingIsLeap(y){return (y%4===0&&y%100!==0)||y%400===0;}
function ingFirstDate(prop){
  const rows=ING_DATA.filter(r=>prop==="all"||r[0]===prop).filter(r=>r[1]);
  if(!rows.length) return null;
  return rows.map(r=>r[1]).sort()[0];
}
function ingDenomYr(prop,yr){
  const fd=ingFirstDate(prop);
  if(!fd) return ingIsLeap(yr)?366:365;
  const first=new Date(fd);
  if(first.getFullYear()===yr){
    const dec31=new Date(yr,11,31);
    return Math.round((dec31-first)/86400000)+1;
  }
  return ingIsLeap(yr)?366:365;
}

// ── INSIGHTS ENGINE ──────────────────────────────────────────────────────────
function computeInsights(activeBK, prop) {
  const insights = [];
  const lvBk = activeBK.filter(b => b[0] === "LV");
  const elBk = activeBK.filter(b => b[0] === "EL");
  const selBk = prop === "all" ? activeBK : activeBK.filter(b => b[0] === prop);

  // Tendencia año a año
  const lv25 = lvBk.filter(b => b[9] === 2025).reduce((s,b) => s+b[6], 0);
  const lv24 = lvBk.filter(b => b[9] === 2024).reduce((s,b) => s+b[6], 0);
  if (lv24 > 0) {
    const d = Math.round((lv25-lv24)/lv24*100);
    if (Math.abs(d) > 5) insights.push({type: d>0?"green":"red", txt: `Las Vegas tuvo un ${d>0?"+":""}${d}% de noches en 2025 vs 2024.`});
  }
  // Dependencia de plataforma
  const bkPct = selBk.length ? selBk.filter(b=>b[1]==="B").length/selBk.length*100 : 0;
  if (bkPct > 70) insights.push({type:"red", txt:`Dependencia alta de Booking (${bkPct.toFixed(0)}%). Diversificar puede reducir comisiones.`});
  // Estancia media
  const avgA = selBk.reduce((s,b)=>s+b[6],0)/(selBk.length||1);
  if (avgA > 10) insights.push({type:"green", txt:`Estancia media de ${avgA.toFixed(1)} noches. Rotación muy eficiente.`});
  // Payback
  const lvPb = roi_simple("LV", activeBK);
  const elPb = roi_simple("EL", activeBK);
  if (lvPb < 10) insights.push({type:"gold", txt:`Las Vegas recuperará la inversión en ~${lvPb.toFixed(0)} años al ritmo actual.`});
  if (elPb < 15 && elPb > 0) insights.push({type:"gold", txt:`Los Elefantes: payback estimado ~${elPb.toFixed(0)} años. Excelente para <2 años activa.`});
  // LV vs EL ADR
  const lvADR = lvBk.reduce((s,b)=>s+b[8],0)/(lvBk.reduce((s,b)=>s+b[6],0)||1);
  const elADR = elBk.reduce((s,b)=>s+b[8],0)/(elBk.reduce((s,b)=>s+b[6],0)||1);
  if (lvADR>0 && elADR>0) insights.push({type:"blue", txt:`ADR Las Vegas (${eur(Math.round(lvADR))}/n) ${lvADR>elADR?"supera":"está por debajo de"} Los Elefantes (${eur(Math.round(elADR))}/n).`});
  return insights.slice(0,5);
}
function roi_simple(p, bkData) {
  const bk = (bkData||BK).filter(b=>b[0]===p);
  const ben = EXCEL_TOTALS[p].beneficio;
  const yrs = p==="LV"?4.5:1.75;
  const annB = ben/yrs;
  return annB>0 ? Math.max(0,(PRICE[p]-ben)/annB) : 99;
}
function InsightsPanel({activeBK, prop}) {
  const ins = useMemo(() => computeInsights(activeBK, prop), [activeBK, prop]);
  if (!ins.length) return null;
  const cols = {red:RED, green:GRN, blue:"#60a5fa", gold:GOLD};
  const icons = {red:"⚠️", green:"✅", blue:"📊", gold:"📈"};
  return <div style={{background:CARD, border:"1px solid "+BD, borderRadius:10, padding:"12px 15px", marginBottom:12}}>
    <div style={{fontSize:10.5, fontWeight:700, color:MUT, textTransform:"uppercase", letterSpacing:.6, marginBottom:8}}>Insights automáticos</div>
    {ins.map((d,i) => <div key={i} style={{display:"flex", gap:8, alignItems:"flex-start", padding:"5px 0", borderBottom:i<ins.length-1?"1px solid "+BD:"none"}}>
      <span style={{fontSize:13, flexShrink:0}}>{icons[d.type]||"•"}</span>
      <span style={{fontSize:12, color:cols[d.type]||MUT, lineHeight:1.5}}>{d.txt}</span>
    </div>)}
  </div>;
}

// ── MAPA LEAFLET (MUNDO) ──────────────────────────────────────────────────────
function PropMap() {
  const mapRef = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!mapRef.current || inst.current) return;
    if (typeof L === "undefined") return;
    try {
      const m = L.map(mapRef.current, {
        center:[40, -10], zoom:3,
        attributionControl:false,
        zoomControl:true,
      });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
        subdomains:'abcd', maxZoom:19
      }).addTo(m);
      const mkPin = (col) => L.divIcon({
        html:`<div style="position:relative;width:18px;height:18px;display:flex;align-items:center;justify-content:center">
          <div style="width:10px;height:10px;border-radius:50%;background:${col};border:2px solid #fff;box-shadow:0 0 0 3px ${col}44;animation:pinpulse 2.2s ease-in-out infinite;position:absolute"></div>
          <div style="width:18px;height:18px;border-radius:50%;background:${col}22;animation:pinring 2.2s ease-in-out infinite;position:absolute"></div>
        </div>`,
        className:"",iconSize:[18,18],iconAnchor:[9,9]
      });
      const PINS=[
        {lat:27.7580, lng:-15.5826, name:"Las Vegas Golf", col:"#C8973A"},
        {lat:27.7640, lng:-15.5760, name:"Los Elefantes",  col:"#C8973A"},
      ];
      PINS.forEach(p=>{
        L.marker([p.lat,p.lng],{icon:mkPin(p.col)}).addTo(m)
          .bindPopup(`<b style="color:${p.col}">${p.name}</b><br><span style="font-size:11px;color:#aaa">Maspalomas, Gran Canaria</span>`);
      });
      inst.current = m;
    } catch(e) { console.warn("Leaflet:", e); }
    return () => { if(inst.current){try{inst.current.remove();}catch(e){} inst.current=null;} };
  }, []);
  return (
    <div style={{position:"relative",height:180,borderRadius:10,overflow:"hidden",border:"1px solid "+BD,marginBottom:14,zIndex:1}}>
      <style>{`@keyframes pinpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}@keyframes pinring{0%{transform:scale(.6);opacity:.8}100%{transform:scale(2.2);opacity:0}}`}</style>
      <div ref={mapRef} style={{height:"100%",width:"100%"}}/>
      <div style={{position:"absolute",bottom:8,right:8,background:"rgba(12,16,20,.88)",borderRadius:7,padding:"5px 10px",fontSize:10.5,color:"#C8973A",fontWeight:600,zIndex:1000,backdropFilter:"blur(4px)",letterSpacing:".02em",pointerEvents:"none"}}>
        2 propiedades · Maspalomas, España
      </div>
    </div>
  );
}

function TabInv({prop, ex, activeBK, onSelectProp}) {
  const lvInc = activeBK.filter(b=>b[0]==="LV").reduce((s,b)=>s+b[8],0);
  const elInc = activeBK.filter(b=>b[0]==="EL").reduce((s,b)=>s+b[8],0);
  const lvYrs=4.5, elYrs=1.75;

  // Gastos totales = Tipo A + Tipo B por propiedad
  const lvGastosA=calcTipoA(["LV"],"all",activeBK);
  const lvGastosB=calcTipoB(["LV"],"all");
  const elGastosA=calcTipoA(["EL"],"all",activeBK);
  const elGastosB=calcTipoB(["EL"],"all");
  const lvGastos=lvGastosA+lvGastosB;
  const elGastos=elGastosA+elGastosB;

  const totalInv = PRICE.LV + PRICE.EL;
  const totalGastos = lvGastos + elGastos;
  const lvBen = lvInc - lvGastos;
  const elBen = elInc - elGastos;
  const totalBen = lvBen + elBen;
  const totalRecup = Math.max(0, totalBen / totalInv * 100);

  // Score 1-10 per brief formula (weighted average)
  function calcScore10(p) {
    const ben = EXCEL_TOTALS[p].beneficio;
    const inc = p==="LV" ? lvInc : elInc;
    const nights = activeBK.filter(b=>b[0]===p).reduce((s,b)=>s+b[6],0);
    const yrs = p==="LV" ? lvYrs : elYrs;
    const roiA = (ben/PRICE[p]*100)/yrs;           // annual net return %
    const recupVel = (ben/PRICE[p]*100)/yrs;       // % recovered / years
    const ocu = Math.min(100, nights/avail(p,"all")*100);
    const adr = nights>0 ? inc/nights : 0;
    // Normalize to 1–10 with calibrated reference ceilings
    const s1 = Math.min(10, Math.max(1, 1+(roiA/5)*9));        // 35% — ROI ceil 5%/yr
    const s2 = Math.min(10, Math.max(1, 1+(recupVel/4)*9));    // 30% — recup ceil 4%/yr
    const s3 = Math.min(10, Math.max(1, 1+(ocu/70)*9));        // 20% — ocu ceil 70%
    const s4 = Math.min(10, Math.max(1, 1+(adr/120)*9));       // 15% — ADR ceil 120€
    return Math.round((s1*0.35 + s2*0.30 + s3*0.20 + s4*0.15)*10)/10;
  }
  const lvScore10 = calcScore10("LV");
  const elScore10 = calcScore10("EL");

  // Estimated recovery year
  function recoveryYear(p) {
    const ben = EXCEL_TOTALS[p].beneficio;
    const yrs = p==="LV" ? lvYrs : elYrs;
    const annB = ben/yrs;
    if (annB<=0) return "N/D";
    const remaining = PRICE[p]-ben;
    if (remaining<=0) return "Recuperado";
    return String(Math.round(TODAY.getFullYear() + remaining/annB));
  }

  // Property card component
  function PropCard({p, inc, color}) {
    const desde = p==="LV"?"dic. 2021":"ago. 2024";
    const yrsLbl = p==="LV"?"4,5 años":"1,7 años";
    const yrsN = p==="LV" ? lvYrs : elYrs;
    const gastos = p==="LV" ? lvGastos : elGastos;
    const beneficio = p==="LV" ? lvBen : elBen;
    const recup = Math.max(0, beneficio/PRICE[p]*100);
    const recYear = recoveryYear(p);
    const score10 = p==="LV" ? lvScore10 : elScore10;
    const [hov,setHov] = useState(false);

    return <div
      onClick={()=>onSelectProp&&onSelectProp(p,"ing")}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        background:CARD,
        border:`1px solid ${hov?"var(--brand)":BD}`,
        borderRadius:12, padding:"18px 20px",
        cursor:"pointer",
        boxShadow:hov?"0 0 0 1px var(--brand)33":"none",
        transition:"border-color .2s,box-shadow .2s",
      }}>

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"var(--brand)",lineHeight:1.2,letterSpacing:"-.01em"}}>
            {p==="LV"?"Las Vegas Golf":"Los Elefantes"}
          </div>
          <div style={{fontSize:11,color:MUT,marginTop:4}}>Maspalomas · desde {desde} · {yrsLbl} activa</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0,marginLeft:20}}>
          <div style={{display:"flex",alignItems:"baseline",gap:4,justifyContent:"flex-end"}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:500,color:GRN,letterSpacing:"-.04em",lineHeight:1}}>{score10}</span>
            <span style={{fontSize:14,color:MUT,fontWeight:400}}>/10</span>
          </div>
          <div style={{fontSize:10,color:MUT,marginTop:3}}>basado en {yrsLbl} de datos</div>
        </div>
      </div>

      {/* Separator */}
      <div style={{height:1,background:BD,margin:"12px 0"}}/>

      {/* METRICS — 5 columns */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
        {[
          ["PRECIO COMPRA",     eur(PRICE[p]),   TXT,  null],
          ["INGRESOS ACUM.",    eur(inc),         TXT,  null],
          ["GASTOS ACUM.",      eur(gastos),      RED,  inc>0 ? pct(gastos/inc*100) : null],
          ["BENEFICIO REAL",    eur(beneficio),   GRN,  inc>0 ? pct((inc-gastos)/inc*100) : null],
          ["RECUPERACIÓN EST.", recYear,          GOLD, null],
        ].map(([l,v,cl,pctVal]) => (
          <div key={l}>
            <div style={{fontSize:9,color:MUT,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5,lineHeight:1.4}}>{l}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:15,fontWeight:500,color:cl,lineHeight:1}}>{v}</div>
            {pctVal && <div style={{fontSize:10,color:MUT,marginTop:3,fontFamily:"'DM Mono',monospace"}}>({pctVal})</div>}
          </div>
        ))}
      </div>

      {/* RECOVERY BAR */}
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{fontSize:11,color:MUT,whiteSpace:"nowrap",minWidth:120}}>Inversión recuperada</div>
        <div style={{flex:1,minWidth:80,background:BD,borderRadius:4,height:4,overflow:"hidden"}}>
          <div style={{width:Math.min(100,recup)+"%",height:"100%",background:color,borderRadius:4,transition:"width .7s ease"}}/>
        </div>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,color:GOLD,whiteSpace:"nowrap"}}>{pct(recup)}</div>
        <div style={{fontSize:11,color:MUT,whiteSpace:"nowrap"}}>Recuperación estimada: <span style={{color:GOLD,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{recYear}</span></div>
      </div>
    </div>;
  }

  return <div>
    {/* TÍTULO */}
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"var(--brand)",marginBottom:16,lineHeight:1.2,letterSpacing:"-.02em"}}>
      Mi Patrimonio
    </div>

    {/* MAPA MUNDO */}
    <PropMap />

    {/* KPIs GLOBALES */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
      {[
        {lbl:"TOTAL INVERTIDO",    val:eur(totalInv),      col:TXT},
        {lbl:"TOTAL GASTOS ACUM.", val:eur(totalGastos),   col:RED},
        {lbl:"BENEFICIO REAL",     val:eur(totalBen),      col:GRN},
        {lbl:"RECUPERADO",         val:pct(totalRecup),    col:GOLD},
      ].map(k => (
        <div key={k.lbl} style={{background:CARD,border:"1px solid "+BD,borderRadius:11,padding:"13px 15px"}}>
          <div style={{fontSize:9.5,color:MUT,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:7}}>{k.lbl}</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22,fontWeight:500,color:k.col,lineHeight:1}}>{k.val}</div>
        </div>
      ))}
    </div>

    {/* TARJETAS POR PROPIEDAD — una por fila */}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <PropCard p="LV" inc={lvInc} color={GOLD_F}/>
      <PropCard p="EL" inc={elInc} color={TEAL_F}/>
    </div>
  </div>;
}

// ── TAB: INGRESOS ─────────────────────────────────────────────────────────────
function TabIng({prop, year, activeBK}) {
  const [expandTable, setExpandTable] = useState(false);

  // Filter income data
  const selYear = year !== "all" ? +year : null;
  
  const data = useMemo(() => 
    ING_DATA.filter(r =>
      (prop === "all" || r[0] === prop) &&
      (year === "all" || r[11] === +year)
    ), [prop, year]);

  const prevData = useMemo(() => {
    if (!selYear) return null;
    return ING_DATA.filter(r =>
      (prop === "all" || r[0] === prop) && r[11] === selYear - 1
    );
  }, [prop, selYear]);

  // Years that have data for this property
  const dataYears = useMemo(() => 
    [...new Set(ING_DATA.filter(r => prop === "all" || r[0] === prop).map(r => r[11]))].sort()
  , [prop]);

  // ── KPIs ──────────────────────────────────────────────────────────────────
  const totalBen = data.reduce((s, r) => s + r[6], 0);
  const totalNoch = data.reduce((s, r) => s + r[4], 0);
  const totalPN = data.reduce((s, r) => s + r[4] * r[5], 0);
  const totalNeto = data.reduce((s, r) => s + r[7], 0);

  const adr = totalNoch > 0 ? totalBen / totalNoch : 0;

  const revparDenom = useMemo(() => {
    if (selYear) return ingDenomYr(prop, selYear);
    return dataYears.reduce((s, y) => s + ingDenomYr(prop, y), 0);
  }, [prop, selYear, dataYears]);

  const revpar = revparDenom > 0 ? totalBen / revparDenom : 0;
  const ppNoche = totalPN > 0 ? totalBen / totalPN : 0;

  // Prev year KPIs for comparison
  const prevBen = prevData ? prevData.reduce((s, r) => s + r[6], 0) : null;
  const prevNoch = prevData ? prevData.reduce((s, r) => s + r[4], 0) : null;
  const prevPN = prevData ? prevData.reduce((s, r) => s + r[4] * r[5], 0) : null;
  const prevADR = (prevBen && prevNoch) ? prevBen / prevNoch : null;
  const prevRevPARDenom = selYear ? ingDenomYr(prop, selYear - 1) : null;
  const prevRevPAR = (prevBen && prevRevPARDenom) ? prevBen / prevRevPARDenom : null;
  const prevPPN = (prevBen && prevPN) ? prevBen / prevPN : null;

  const delta = (cur, prev) => {
    if (!prev || prev === 0) return null;
    return ((cur - prev) / Math.abs(prev)) * 100;
  };
  const fmtDelta = (d) => {
    if (d === null) return null;
    const col = d >= 0 ? "var(--pos)" : "var(--neg)";
    const sign = d >= 0 ? "↑ +" : "↓ ";
    return <span style={{fontSize:11, color:col, marginTop:4, display:"block"}}>{sign}{Math.abs(d).toFixed(0)}% vs {selYear - 1}</span>;
  };

  // ── GRÁFICO 1: BARRAS AGRUPADAS POR MES (max 3 años) ──────────────────────
  const chartYears = useMemo(() => {
    const base = selYear || Math.max(...dataYears);
    return dataYears.filter(y => y <= base && y >= base - 2);
  }, [dataYears, selYear]);

  const TODAY = new Date();
  const todayY = TODAY.getFullYear(), todayM = TODAY.getMonth() + 1;

  // Monthly income by year
  const monthlyByYear = useMemo(() => {
    const out = {};
    chartYears.forEach(y => {
      out[y] = {};
      for (let m = 1; m <= 12; m++) {
        const rows = ING_DATA.filter(r => (prop === "all" || r[0] === prop) && r[11] === y && r[12] === m);
        out[y][m] = rows.reduce((s, r) => s + r[6], 0);
      }
    });
    return out;
  }, [chartYears, prop]);

  // ── GRÁFICO 2: ADR y RevPAR por mes (año seleccionado o más reciente) ────
  const lineYear = selYear || Math.max(...dataYears);
  const monthlyADR_RevPAR = useMemo(() => {
    return Array.from({length: 12}, (_, i) => {
      const m = i + 1;
      const rows = ING_DATA.filter(r => (prop === "all" || r[0] === prop) && r[11] === lineYear && r[12] === m);
      if (!rows.length) return {m, lbl: MS[m], adr: null, revpar: null};
      const ben = rows.reduce((s, r) => s + r[6], 0);
      const nch = rows.reduce((s, r) => s + r[4], 0);
      const daysInMonth = new Date(lineYear, m, 0).getDate();
      return {
        m, lbl: MS[m],
        adr: nch > 0 ? ben / nch : null,
        revpar: daysInMonth > 0 ? ben / daysInMonth : null,
      };
    });
  }, [lineYear, prop]);

  // ── PLATAFORMAS ────────────────────────────────────────────────────────────
  const platforms = useMemo(() => {
    const plats = {};
    data.forEach(r => {
      const p = r[3] || "Privado";
      if (!plats[p]) plats[p] = {nombre: p, reservas: 0, ben: 0, nch: 0, pn: 0};
      plats[p].reservas++;
      plats[p].ben += r[6];
      plats[p].nch += r[4];
      plats[p].pn += r[4] * r[5];
    });
    return Object.values(plats)
      .filter(p => p.reservas > 0 && p.nombre !== "")
      .map(p => ({
        ...p,
        adr: p.nch > 0 ? p.ben / p.nch : 0,
        revpar: revparDenom > 0 ? p.ben / revparDenom : 0,
        ppn: p.pn > 0 ? p.ben / p.pn : 0,
      }))
      .sort((a, b) => b.ben - a.ben);
  }, [data, revparDenom]);

  // Best value per column (for green highlight)
  const bestValues = useMemo(() => ({
    reservas: Math.max(...platforms.map(p => p.reservas)),
    ben: Math.max(...platforms.map(p => p.ben)),
    adr: Math.max(...platforms.map(p => p.adr)),
    revpar: Math.max(...platforms.map(p => p.revpar)),
    ppn: Math.max(...platforms.map(p => p.ppn)),
  }), [platforms]);

  // ── TABLA RESERVAS ─────────────────────────────────────────────────────────
  const sortedReservations = useMemo(() =>
    [...data].filter(r => r[6] > 0).sort((a, b) => b[6] - a[6])
  , [data]);
  const displayedReservations = expandTable ? sortedReservations : sortedReservations.slice(0, 10);

  // ── NIVEL 3: MÉTRICAS DE DETALLE ──────────────────────────────────────────
  const allPropData = ING_DATA.filter(r => prop === "all" || r[0] === prop);
  const bestReserva = allPropData.length ? allPropData.reduce((a, b) => b[6] > a[6] ? b : a, allPropData[0]) : null;
  const bestADRRow = allPropData.filter(r => r[9] > 0).length ? allPropData.filter(r=>r[9]>0).reduce((a, b) => b[9] > a[9] ? b : a, allPropData.filter(r=>r[9]>0)[0]) : null;
  const costeMedio = data.length ? data.reduce((s, r) => s + Math.abs(r[8]), 0) / data.length : 0;

  const mesMasRentable = useMemo(() => {
    const byMes = {};
    data.forEach(r => {
      byMes[r[12]] = (byMes[r[12]] || 0) + r[6];
    });
    const best = Object.entries(byMes).sort((a, b) => b[1] - a[1])[0];
    return best ? {mes: +best[0], total: best[1]} : null;
  }, [data]);

  const bestADRYear = useMemo(() => {
    const byYear = {};
    allPropData.forEach(r => {
      if (!byYear[r[11]]) byYear[r[11]] = {ben: 0, nch: 0};
      byYear[r[11]].ben += r[6]; byYear[r[11]].nch += r[4];
    });
    const byYearADR = Object.entries(byYear).map(([y, d]) => ({y: +y, adr: d.nch > 0 ? d.ben / d.nch : 0}));
    return byYearADR.sort((a, b) => b.adr - a.adr)[0];
  }, [allPropData]);

  // ── RENDERS ────────────────────────────────────────────────────────────────
  const platColor = p => p === "Airbnb" ? "#f87171" : p === "Booking" ? "#60a5fa" : "#a78bfa";

  const COLORS3 = {oldest: "#3D5555", mid: "#557373", newest: "#C8973A"};
  const colKeys = chartYears.length === 1 ? ["newest"] : chartYears.length === 2 ? ["mid","newest"] : ["oldest","mid","newest"];
  const colorOf = i => COLORS3[colKeys[i]] || COLORS3.newest;

  return <div>

    {/* ── KPIs ── */}
    <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:16}}>
      <div style={c.card}>
        <div style={c.lbl}>Ingresos netos</div>
        <div style={{...c.big("var(--pos)"), fontSize:20}}>{eur(Math.round(totalBen))}</div>
        {selYear && fmtDelta(delta(totalBen, prevBen))}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>ADR medio</div>
        <div style={{...c.big(), fontSize:20}}>{eur(Math.round(adr))}</div>
        <div style={{fontSize:10.5, color:MUT, marginTop:2}}>precio por noche</div>
        {selYear && fmtDelta(delta(adr, prevADR))}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>RevPAR</div>
        <div style={{...c.big("var(--acc)"), fontSize:20}}>{eur(Math.round(revpar))}</div>
        <div style={{fontSize:10.5, color:MUT, marginTop:2}}>ingreso por día disponible</div>
        {selYear && fmtDelta(delta(revpar, prevRevPAR))}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>€ / persona / noche</div>
        <div style={{...c.big(), fontSize:20}}>{eur(Math.round(ppNoche))}</div>
        {selYear && fmtDelta(delta(ppNoche, prevPPN))}
      </div>
    </div>

    {/* ── GRÁFICO 1: Ingresos netos por mes ── */}
    <div style={c.sec}>Ingresos netos por mes</div>
    <div style={{...c.card, marginBottom:14}}>
      <IngBarChart monthlyByYear={monthlyByYear} years={chartYears} colorOf={colorOf} colKeys={colKeys} COLORS3={COLORS3} todayY={todayY} todayM={todayM}/>
    <div style={{fontSize:10.5, color:MUT, marginTop:6}}>€ netos sobre cada barra. Meses futuros en transparencia.</div>
    </div>

    {/* ── GRÁFICO 2: ADR y RevPAR por mes ── */}
    <div style={c.sec}>ADR y RevPAR por mes · {lineYear}</div>
    <div style={{...c.card, marginBottom:14}}>
      <IngLineChart data={monthlyADR_RevPAR}/>
      <div style={{display:"flex", gap:20, marginTop:10, justifyContent:"center"}}>
        <div style={{display:"flex", alignItems:"center", gap:6, fontSize:11.5}}>
          <div style={{width:20, height:2, background:"var(--brand)", borderRadius:1}}/><span style={{color:"var(--brand)", fontWeight:600}}>ADR</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:6, fontSize:11.5}}>
          <div style={{width:20, height:2, background:"var(--acc)", borderRadius:1}}/><span style={{color:"var(--acc)", fontWeight:600}}>RevPAR</span>
        </div>
      </div>
    </div>

    {/* ── ANÁLISIS POR PLATAFORMA ── */}
    {platforms.length > 0 && <>
      <div style={c.sec}>Análisis por plataforma</div>
      <div style={{...c.card, marginBottom:14, overflowX:"auto"}}>
        <table style={{width:"100%", borderCollapse:"collapse", fontSize:12.5}}>
          <thead>
            <tr style={{color:MUT, fontSize:10.5, textTransform:"uppercase", letterSpacing:"0.06em"}}>
              {["Plataforma","Reservas","Ingresos netos","ADR medio","RevPAR","€ / p / noche"].map(h =>
                <th key={h} style={{padding:"6px 10px", textAlign:h==="Plataforma"?"left":"right", fontWeight:600, whiteSpace:"nowrap"}}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {platforms.map((p, i) => {
              const isBest = v => v > 0;
              const bestStyle = (val, ref) => val === ref && val > 0 ? {color:"var(--pos)", fontWeight:700} : {};
              return <tr key={p.nombre} style={{borderTop:`1px solid ${BD}`}}>
                <td style={{padding:"8px 10px"}}>
                  <span style={{background:platColor(p.nombre)+"22", color:platColor(p.nombre), border:`1px solid ${platColor(p.nombre)}44`, borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:600}}>{p.nombre}</span>
                </td>
                <td style={{padding:"8px 10px", textAlign:"right", fontFamily:"'DM Mono',monospace", ...bestStyle(p.reservas, bestValues.reservas)}}>{p.reservas}</td>
                <td style={{padding:"8px 10px", textAlign:"right", fontFamily:"'DM Mono',monospace", ...bestStyle(p.ben, bestValues.ben)}}>{eur(Math.round(p.ben))}</td>
                <td style={{padding:"8px 10px", textAlign:"right", fontFamily:"'DM Mono',monospace", ...bestStyle(p.adr, bestValues.adr)}}>{eur(Math.round(p.adr))}</td>
                <td style={{padding:"8px 10px", textAlign:"right", fontFamily:"'DM Mono',monospace", ...bestStyle(p.revpar, bestValues.revpar)}}>{eur(Math.round(p.revpar))}</td>
                <td style={{padding:"8px 10px", textAlign:"right", fontFamily:"'DM Mono',monospace", ...bestStyle(p.ppn, bestValues.ppn)}}>{eur(Math.round(p.ppn))}</td>
              </tr>;
            })}
          </tbody>
        </table>
      <div style={{fontSize:10.5, color:MUT, marginTop:8}}>Verde: mejor resultado en cada métrica.</div>
      </div>
    </>}

    {/* ── TABLA DE RESERVAS ── */}
    <div style={c.sec}>Reservas del período</div>
    <div style={{...c.card, marginBottom:6, overflowX:"auto"}}>
      <table style={{width:"100%", borderCollapse:"collapse", fontSize:12}}>
        <thead>
          <tr style={{color:MUT, fontSize:10.5, textTransform:"uppercase", letterSpacing:"0.06em"}}>
            {["Entrada · Salida","Plataforma","Noches","Personas","Ingreso neto","€ / noche","€ / p / noche"].map(h =>
              <th key={h} style={{padding:"5px 9px", textAlign:h==="Entrada · Salida"||h==="Plataforma"?"left":"right", fontWeight:600, whiteSpace:"nowrap"}}>{h}</th>
            )}
          </tr>
        </thead>
        <tbody>
          {displayedReservations.map((r, i) => {
            const fE = r[1] ? r[1].slice(8,10)+" "+["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][+r[1].slice(5,7)-1] : "";
            const fS = r[2] ? r[2].slice(8,10)+" "+["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][+r[2].slice(5,7)-1] : "";
            return <tr key={i} style={{borderTop:`1px solid ${BD}`, cursor:"default"}}
              onMouseEnter={e=>e.currentTarget.style.background="#F8F6F108"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <td style={{padding:"7px 9px", whiteSpace:"nowrap", fontFamily:"'DM Mono',monospace", fontSize:11.5}}>{fE} · {fS}</td>
              <td style={{padding:"7px 9px"}}>
                {r[3] && <span style={{background:platColor(r[3])+"22", color:platColor(r[3]), border:`1px solid ${platColor(r[3])}44`, borderRadius:20, padding:"2px 8px", fontSize:10.5, fontWeight:600}}>{r[3]}</span>}
              </td>
              <td style={{padding:"7px 9px", textAlign:"right", fontFamily:"'DM Mono',monospace"}}>{r[4]}</td>
              <td style={{padding:"7px 9px", textAlign:"right", fontFamily:"'DM Mono',monospace"}}>{r[5]}</td>
              <td style={{padding:"7px 9px", textAlign:"right", fontFamily:"'DM Mono',monospace", color:"var(--pos)", fontWeight:600}}>{eur(Math.round(r[6]))}</td>
              <td style={{padding:"7px 9px", textAlign:"right", fontFamily:"'DM Mono',monospace"}}>{eur(Math.round(r[9]))}</td>
              <td style={{padding:"7px 9px", textAlign:"right", fontFamily:"'DM Mono',monospace"}}>{eur(Math.round(r[10]))}</td>
            </tr>;
          })}
        </tbody>
      </table>
      {sortedReservations.length > 10 && (
        <div style={{textAlign:"center", marginTop:10}}>
          <button onClick={() => setExpandTable(e => !e)} style={{
            padding:"6px 20px", borderRadius:20, border:`1px solid ${BD}`,
            background:"transparent", color:MUT, fontSize:12, cursor:"pointer",
          }}>
            {expandTable ? "Ver menos ▲" : `Ver todas (${sortedReservations.length}) ▼`}
          </button>
        </div>
      )}
    </div>
    <div style={{fontSize:10.5, color:MUT, marginBottom:16}}>Ordenado por mayor ingreso neto.</div>

    {/* ── NIVEL 3: MÉTRICAS DE DETALLE ── */}
    <div style={c.sec}>Métricas de detalle</div>
    <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:20}}>
      <div style={c.card}>
        <div style={c.lbl}>Ingreso neto más alto</div>
        {bestReserva && <>
          <div style={{...c.big("var(--acc)"), fontSize:18}}>{eur(Math.round(bestReserva[6]))}</div>
          <div style={c.desc}>{ML[bestReserva[12]]} {bestReserva[11]} · {bestReserva[3]} · {bestReserva[4]} noches</div>
        </>}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>ADR más alto</div>
        {bestADRRow && <>
          <div style={{...c.big(), fontSize:18}}>{eur(Math.round(bestADRRow[9]))}<span style={{fontSize:11, color:MUT, fontFamily:"'DM Sans',sans-serif"}}>/noche</span></div>
          <div style={c.desc}>{ML[bestADRRow[12]]} {bestADRRow[11]} · {bestADRRow[3]} · {bestADRRow[4]} noches</div>
        </>}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Neto tras gastos variables</div>
        <div style={{...c.big("var(--pos)"), fontSize:18}}>{eur(Math.round(totalNeto))}</div>
        <div style={c.desc}>Tras limpieza, check-in y cesta</div>
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Coste medio por reserva</div>
        <div style={{...c.big("var(--neg)"), fontSize:18}}>{eur(Math.round(costeMedio))}</div>
        <div style={c.desc}>Check-in + limpieza + cesta bienvenida</div>
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Mes más rentable</div>
        {mesMasRentable && <>
          <div style={{...c.big("var(--brand)"), fontSize:18}}>{ML[mesMasRentable.mes]}</div>
          <div style={c.desc}>{eur(Math.round(mesMasRentable.total))} en el período</div>
        </>}
      </div>
      <div style={c.card}>

// ── OCUPACIÓN HELPERS ─────────────────────────────────────────────────────────
function ocuDaysInMonth(yr,mo){return new Date(yr,mo,0).getDate();}

// Day-by-day proration for chart bars
function ocuNochesByYearMonth(propFilter,ocuBkSrc){
  // Prorate nights day-by-day so cross-month bookings are split correctly
  const out={};
  ocuBkSrc.filter(b=>propFilter==="all"||b[0]===propFilter).forEach(b=>{
    const ci=new Date(b[4]),co=new Date(b[5]);
    let d=new Date(ci);
    while(d<co){
      const y=d.getFullYear(),m=d.getMonth()+1;
      if(!out[y]) out[y]={};
      out[y][m]=(out[y][m]||0)+1;
      d.setDate(d.getDate()+1);
    }
  });
  return out;
}

// Prorate bookings day-by-day → { "year|month": nights }
// yearFilter: number to restrict to one year, or null for all
function buildByYM(bkList,yearFilter){
  const out={};
  bkList.forEach(b=>{
    const ci=new Date(b[4]),co=new Date(b[5]);
    let d=new Date(ci);
    while(d<co){
      const y=d.getFullYear(),m=d.getMonth()+1;
      if(!yearFilter||y===yearFilter){
        const k=`${y}|${m}`;
        out[k]=(out[k]||0)+1;
      }
      d.setDate(d.getDate()+1);
    }
  });
  return out;
}

// ── REGLA DEFINITIVA DE DENOMINADOR ──────────────────────────────────────────
// 365 días (366 bisiesto), salvo el año de la primera reserva de la propiedad
// donde el denominador son los días desde esa primera reserva hasta el 31-Dic.
function isLeap(y){return (y%4===0&&y%100!==0)||y%400===0;}

function firstBkDate(prop){
  const bk=OCU_BK.filter(b=>prop==="all"||b[0]===prop);
  if(!bk.length) return null;
  return bk.map(b=>b[4]).sort()[0];
}

// Denominator for ONE specific year
function ocuDenomYr(prop,yr){
  const fd=firstBkDate(prop);
  if(!fd) return isLeap(yr)?366:365;
  const firstDate=new Date(fd);
  if(firstDate.getFullYear()===yr){
    // Exception: days from first booking to Dec 31 of that year
    const dec31=new Date(yr,11,31);
    return Math.round((dec31-firstDate)/86400000)+1;
  }
  return isLeap(yr)?366:365;
}

// Total denominator for prop + period (selYr=null means all years)
function ocuDenomTotal(prop,selYr,dataYears){
  if(selYr) return ocuDenomYr(prop,selYr);
  if(!dataYears||!dataYears.length) return 365;
  return dataYears.reduce(function(s,y){return s+ocuDenomYr(prop,y);},0);
}

// Sum nights from a byYM map
function byYMNights(byYM){
  return Object.values(byYM).reduce(function(s,n){return s+n;},0);
}

function ocuPctMonth(noches,yr,mo){
  const days=ocuDaysInMonth(yr,mo);
  return days>0?Math.min(100,(noches/days*100)):0;
}

// Grouped bar chart for Ocupación — max 3 years
function OcuBarChart({years,byYearMonth,TODAY_STR}){
  const [tip,setTip]=useState(null);
  const COLORS={oldest:"#3D5555",mid:"#557373",newest:"#C8973A"};
  const colKeys=years.length===1?["newest"]:years.length===2?["mid","newest"]:["oldest","mid","newest"];
  const colorOf=(idx)=>COLORS[colKeys[idx]]||COLORS.newest;
  // Wider viewBox to accommodate doubled bar width while keeping group spacing
  const W=820,H=210,PL=8,PB=22,PT=30,PR=8,cW=W-PL-PR,cH=H-PB-PT;
  const maxN=Math.max(...years.flatMap(y=>Array.from({length:12},(_,i)=>byYearMonth[y]?.[i+1]||0)),1);
  const slotW=cW/12; // ≈67px per month slot
  const nBars=years.length;
  const barGap=1; // tight gap between bars within same group
  // bW gives ≈19-20px bars (≈2× previous ~10px), group spacing ≈9px
  const bW=Math.max(8,Math.min(26,(slotW-10)/nBars-barGap));
  const totalBW=bW*nBars+barGap*(nBars-1);
  const todayParts=TODAY_STR.split("-");
  const todayY=+todayParts[0],todayM=+todayParts[1];
  return <div style={{position:"relative"}}>
    {tip&&<div className="tip" style={{left:tip.x+12,top:tip.y-40,pointerEvents:"none",zIndex:999}}>
      {tip.label}
    </div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} onMouseLeave={()=>setTip(null)}>
      {Array.from({length:12},(_,mi)=>{
        const m=mi+1;
        const sX=PL+mi*slotW;
        const bSX=sX+(slotW-totalBW)/2;
        const isFuture=years.includes(todayY)&&m>todayM&&years[years.length-1]===todayY;
        return <g key={m}>
          {years.map((yr,yi)=>{
            const n=byYearMonth[yr]?.[m]||0;
            const bH=Math.max(2,(n/maxN)*cH);
            const x=bSX+yi*(bW+barGap);
            const y=PT+cH-bH;
            const col=colorOf(yi);
            const future=isFuture&&yi===years.length-1;
            return <g key={yr}>
              <rect x={x} y={y} width={bW} height={bH} fill={col} rx={2}
                opacity={future?0.22:1}
                style={{cursor:"crosshair",transition:"opacity .2s"}}
                onMouseEnter={e=>{const days=ocuDaysInMonth(yr,m);const pct=days>0?Math.min(100,n/days*100):0;setTip({x:e.clientX,y:e.clientY,label:`${ML[m]} ${yr} · ${n} noches (${pct.toFixed(0)}%)`});}}/>
              {n>0&&!future&&<text x={x+bW/2} y={y-4} textAnchor="middle" fill={col} fontSize={8} fontWeight="700">{n}</text>}
            </g>;
          })}
          {/* Month label */}
          <text x={sX+slotW/2} y={H-5} textAnchor="middle" fill="#8A8C80" fontSize={9}>{MS[m]}</text>
        </g>;
      })}
    </svg>
    {/* Legend */}
    <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      {years.map((yr,yi)=><div key={yr} style={{display:"flex",alignItems:"center",gap:5,fontSize:11.5,color:"var(--mut)"}}>
        <div style={{width:12,height:12,borderRadius:2,background:colorOf(yi),flexShrink:0}}/>
        <span style={{color:colorOf(yi),fontWeight:700}}>{yr}</span>
      </div>)}
    </div>
  </div>;
}

function TabHue({prop,year}){
  // OCU data filtered
  const okuAll=useMemo(()=>OCU_BK.filter(b=>prop==="all"||b[0]===prop),[prop]);
  const okuFiltered=useMemo(()=>okuAll.filter(b=>year==="all"||b[7]===+year),[okuAll,year]);

  // Años con datos
  const allDataYears=useMemo(()=>[...new Set(okuAll.map(b=>b[7]))].sort(),[okuAll]);
  const selYr=year!=="all"?+year:null;

  // Chart years: max 3
  const chartYears=useMemo(()=>{
    if(selYr){
      return allDataYears.filter(y=>y<=selYr).slice(-3);
    }
    return allDataYears.slice(-3);
  },[selYr,allDataYears]);

  // ── OCUPACIÓN — denominador fijo: 365/366, excepción primer año ─────────────
  // Numerator: prorated nights day-by-day (handles cross-month/year bookings)
  const byYMKpi=useMemo(()=>buildByYM(okuAll,selYr),[okuAll,selYr]);
  const nochesProrateadas=useMemo(()=>byYMNights(byYMKpi),[byYMKpi]);
  const denominadorDias=useMemo(()=>ocuDenomTotal(prop,selYr,allDataYears),[prop,selYr,allDataYears]);
  const ocuMedia=denominadorDias>0?Math.min(100,nochesProrateadas/denominadorDias*100):0;

  // reservas = COUNT of bookings by check-in year (booking-level metric)
  const reservas=okuFiltered.length;
  const withFR=okuFiltered.filter(b=>b[3]);
  const antelacion=withFR.length>0?withFR.reduce((s,b)=>{const d=(new Date(b[4])-new Date(b[3]))/86400000;return s+Math.max(0,d);},0)/withFR.length:null;

  // Previous year comparison — same fixed-denominator rule
  const prevKpis=useMemo(()=>{
    if(!selYr) return null;
    const py=selYr-1;
    const prevByYM=buildByYM(okuAll,py);
    const prevN=byYMNights(prevByYM);
    if(!prevN) return null;
    const prevDenom=ocuDenomYr(prop,py);
    const pb=okuAll.filter(b=>b[7]===py).length;
    return{noches:prevN,reservas:pb,ocuMedia:prevDenom>0?Math.min(100,prevN/prevDenom*100):0};
  },[selYr,okuAll,prop]);

  function delta(curr,prev,isCount){
    if(!prev||prev===0) return null;
    const d=((curr-prev)/prev*100);
    const sign=d>=0?"↑ +":"↓ ";
    const col=d>=0?"var(--pos)":"var(--neg)";
    return <div style={{fontSize:10.5,color:col,marginTop:4,fontWeight:600}}>{sign}{Math.abs(d).toFixed(0)}% vs {selYr-1}</div>;
  }

  // Alert: month in current year with 0 reservas but prev year had some
  const alertItems=useMemo(()=>{
    if(!selYr) return [];
    const py=selYr-1;
    const alerts=[];
    for(let m=1;m<=12;m++){
      const curr=okuFiltered.filter(b=>b[8]===m).length;
      const prev=okuAll.filter(b=>b[7]===py&&b[8]===m).length;
      if(curr===0&&prev>0) alerts.push({month:ML[m],prevN:prev});
    }
    return alerts;
  },[selYr,okuFiltered,okuAll]);

  // Chart data
  const byYearMonth=useMemo(()=>ocuNochesByYearMonth(prop,OCU_BK),[prop]);

  // Platform distribution
  const platData=useMemo(()=>{
    const total=okuFiltered.length;
    const totalN=nochesProrateadas;
    return["B","A","P"].map(code=>{
      const pb=okuFiltered.filter(b=>b[1]===code);
      const pn=pb.reduce((s,b)=>s+b[6],0);
      return{code,name:{B:"Booking",A:"Airbnb",P:"Privado"}[code],col:{B:"#60a5fa",A:"#f87171",P:"#c084fc"}[code],cnt:pb.length,noches:pn,pctRes:total>0?pb.length/total*100:0,pctNoc:totalN>0?pn/totalN*100:0};
    }).filter(p=>p.cnt>0);
  },[okuFiltered,nochesProrateadas]);

  // Advance heatmap — trimester × booking month
  const heatRows=useMemo(()=>{
    const withFRAll=okuAll.filter(b=>b[3]);
    // trimester of checkin × month of booking
    const counts={Q1:{},Q2:{},Q3:{},Q4:{}};
    withFRAll.forEach(b=>{
      const q="Q"+Math.ceil(new Date(b[4]).getMonth()/3+0.1);
      const bm=new Date(b[3]).getMonth()+1;
      const qk={Q1:"Q1 (Ene-Mar)",Q2:"Q2 (Abr-Jun)",Q3:"Q3 (Jul-Sep)",Q4:"Q4 (Oct-Dic)"}[q]||q;
      if(!counts[q]) return;
      counts[q][bm]=(counts[q][bm]||0)+1;
    });
    return["Q1","Q2","Q3","Q4"].map(q=>({q,label:{Q1:"Q1 Ene-Mar",Q2:"Q2 Abr-Jun",Q3:"Q3 Jul-Sep",Q4:"Q4 Oct-Dic"}[q],data:counts[q]||{}}));
  },[okuAll]);
  const maxHeatV=Math.max(...heatRows.flatMap(r=>Object.values(r.data)),1);

  // Portfolio comparison — LV vs EL
  const showPortfolio=useMemo(()=>{
    const lvData=OCU_BK.filter(b=>b[0]==="LV"&&(year==="all"||b[7]===+year));
    const elData=OCU_BK.filter(b=>b[0]==="EL"&&(year==="all"||b[7]===+year));
    return lvData.length>0&&elData.length>0;
  },[year]);

  const portfolioStats=useMemo(()=>{
    if(!showPortfolio) return null;
    const calc=function(p){
      const bkProp=OCU_BK.filter(b=>b[0]===p);
      const propDataYears=[...new Set(bkProp.map(b=>b[7]))].sort();
      const portByYM=buildByYM(bkProp,selYr);
      const portN=byYMNights(portByYM);
      const portDenom=ocuDenomTotal(p,selYr,propDataYears);
      const ocu=portDenom>0?Math.min(100,portN/portDenom*100):0;
      const bkFilt=bkProp.filter(b=>year==="all"||b[7]===+year);
      const fr=bkFilt.filter(b=>b[3]);
      const ant=fr.length>0?fr.reduce((s,b)=>s+Math.max(0,(new Date(b[4])-new Date(b[3]))/86400000),0)/fr.length:null;
      const flojoByYM=buildByYM(bkFilt,selYr);
      const byMonthN={};Object.entries(flojoByYM).forEach(function(e){const m=+e[0].split('|')[1];byMonthN[m]=(byMonthN[m]||0)+e[1];});
      const allMonths=Object.keys(byMonthN).map(Number);
      const flojo=allMonths.length?allMonths.reduce(function(a,b){return byMonthN[a]<byMonthN[b]?a:b;}):null;
      const dates=bkProp.filter(b=>b[4]).map(b=>b[4]).sort();
      return{ocu,ant,flojo,firstDate:dates[0]||null};
    };
    return{LV:calc("LV"),EL:calc("EL")};
  },[showPortfolio,year,selYr]);

  // Level 3 details
  const detailStats=useMemo(function(){
    if(!okuFiltered.length) return null;
    const durMedia=nochesProrateadas/Math.max(1,reservas);
    // Mes fuerte/flojo from prorated nights in filtered period
    const byMNights={};

    const allM=Object.keys(byMNights).map(Number);
    const mesFuerte=allM.length?allM.reduce(function(a,b){return byMNights[a]>byMNights[b]?a:b;}):null;
    const mesFlojo=allM.length?allM.reduce(function(a,b){return byMNights[a]<byMNights[b]?a:b;}):null;
    const totalHist=okuAll.length;
    // Best year: fixed-denominator rule
    const allHistYears=[...new Set(okuAll.map(function(b){return b[7];}))];
    var bestYr=null,bestPct=-1;
    allHistYears.forEach(function(y){
      const n=byYMNights(buildByYM(okuAll,y));
      const denom=ocuDenomYr(prop,y);
      const pct=denom>0?n/denom*100:0;
      if(pct>bestPct){bestPct=pct;bestYr=y;}
    });
    // Max advance
    const maxAnt=okuAll.filter(function(b){return b[3];}).reduce(function(mx,b){
      const d=(new Date(b[4])-new Date(b[3]))/86400000;
      return Math.max(mx,d);
    },0);
    return{durMedia,mesFuerte,mesFlojo,totalHist,bestYrByOcu:bestYr,maxAnt};
  },[okuFiltered,okuAll,nochesProrateadas,reservas,byYMKpi,prop]);

  const propColor=prop==="EL"?TEAL:GOLD;

  return <div>
    {/* ── NIVEL 1: KPIs ─── */}
    <div style={{...c.grid("repeat(4,1fr)"),marginBottom:12}}>
      <div style={c.card}>
        <div style={c.lbl}>Noches ocupadas</div>
        <div style={c.big()}><span style={{fontFamily:"'DM Mono',monospace",fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em",fontSize:22}}>{num(nochesProrateadas)}</span></div>
        <div style={c.desc}>Total período seleccionado</div>
        {selYr&&prevKpis&&delta(nochesProrateadas,prevKpis.noches)}
      </div>
      <div style={c.card}>
        <div style={c.lbl}>Ocupación media</div>
        <div style={{...c.big(ocuMedia>60?"var(--pos)":ocuMedia<40?"var(--neg)":TXT)}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:22}}>{_fmtN(ocuMedia,1)}%</span></div>
        <div style={c.desc}>Noches ÷ días disponibles</div>
        {selYr&&prevKpis&&delta(ocuMedia,prevKpis.ocuMedia)}
      </div>

    {/* ── NIVEL 2: HEATMAP ANTELACIÓN ─── */}

          </tr></thead>

      {[

        {lbl:"Antelación máxima",val:detailStats.maxAnt>0?`${Math.round(detailStats.maxAnt)} días`:"—",desc:"Reserva más anticipada"},
      ].map(d=><div key={d.lbl} style={c.card}>

}


// ── TAB: GASTOS ─────────────────────────────────────────────────────────────
function TabGastos({prop,year,ex,setEx,activeBK}){
  const [addModal,setAddModal]=useState(false);
  const [modModal,setModModal]=useState(false);
  const [form,setForm]=useState({prop:prop==="all"?"LV":prop,year:"2026",month:"",cat:"Comunidad",amount:""});
  const [modForm,setModForm]=useState({cat:"Comunidad",amount:"",fromYear:"2026",fromMonth:"1"});
  const ps=prop==="all"?["LV","EL"]:[prop];

  const CAT_COLORS={"IBI y Basuras":"#60a5fa","Seguros":"#a78bfa","Comunidad":"#34d399","Agua":"#38bdf8","Luz":"#fbbf24","Derramas":"#f87171","Internet":"#fb923c","Alarma":"#e879f9","Impuestos IRPF":"#f43f5e","Rotación":"#94a3b8"};
  const CAT_DROP=["IBI y Basuras","Seguros","Comunidad","Agua","Luz","Derramas","Internet","Alarma","Impuestos","Otro"];
  const keyMap={"IBI y Basuras":"IBI","Seguros":"Seguros","Comunidad":"Comunidad","Agua":"Agua","Luz":"Luz","Derramas":"Derramas","Internet":"Internet","Alarma":"Alarma"};

  // ── Tipo A: Rotación + IRPF ────────────────────────────────────────────────
  const tipoArot=useMemo(()=>{
    const bkF=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&(year==="all"||b[9]===+year));
    return bkF.reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
  },[prop,year,activeBK]);

  const tipoAirpf=useMemo(()=>{
    const yrs=year==="all"?[2022,2023,2024,2025,2026]:[+year];
    let tot=0;
    ps.forEach(p=>{yrs.forEach(y=>{const yrD=MONTHLY_FIXED[p]?.[y]||{};Object.values(yrD).forEach(m=>{tot+=(m.Impuestos||0);});});});
    return tot;
  },[prop,year]);

  const totalTipoA=tipoArot+tipoAirpf;

  // ── Tipo B: IBI+Seguros+Comunidad+Agua+Luz+Derramas+Internet+Alarma ────────
  const catBTotals=useMemo(()=>{
    const yrs=year==="all"?[2022,2023,2024,2025,2026]:[+year];
    const tots={};
    CAT_B.forEach(cat=>{tots[cat]=0;});
    ps.forEach(p=>{yrs.forEach(y=>{const yrD=MONTHLY_FIXED[p]?.[y]||{};Object.values(yrD).forEach(m=>{CAT_B.forEach(cat=>{tots[cat]+=(m[cat]||0);});});});});
    return tots;
  },[prop,year]);

  const totalTipoB=useMemo(()=>Object.values(catBTotals).reduce((s,v)=>s+v,0),[catBTotals]);
  const totalGastos=totalTipoA+totalTipoB;

  // Extra expenses
  const exTot=useMemo(()=>ex.filter(e=>prop==="all"||e.prop===prop).filter(e=>year==="all"||e.year===+year).reduce((s,e)=>s+e.amount,0),[ex,prop,year]);

  // KPI metrics
  const bkF=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&(year==="all"||b[9]===+year));
  const gastoAnioActual=useMemo(()=>{
    const y=2026;
    const bkCur=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===y);
    const rot=bkCur.reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
    let irpf=0,b2=0;
    ps.forEach(p=>{const yrD=MONTHLY_FIXED[p]?.[y]||{};Object.values(yrD).forEach(m=>{irpf+=(m.Impuestos||0);CAT_B.forEach(c=>{b2+=(m[c]||0);});});});
    return rot+irpf+b2;
  },[prop,activeBK]);
  const gastoAnioAnterior=useMemo(()=>{
    const y=2025;
    const bkP=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===y);
    const rot=bkP.reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
    let irpf=0,b2=0;
    ps.forEach(p=>{const yrD=MONTHLY_FIXED[p]?.[y]||{};Object.values(yrD).forEach(m=>{irpf+=(m.Impuestos||0);CAT_B.forEach(c=>{b2+=(m[c]||0);});});});
    return rot+irpf+b2;
  },[prop,activeBK]);

  // Bar chart by year (total A+B)
  const chartYears=[2022,2023,2024,2025,2026].filter(yr=>{
    if(year!=="all"&&+year!==yr) return false;
    const bkY=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr);
    const rot=bkY.reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
    let irpf=0,b2=0;
    ps.forEach(p=>{const yrD=MONTHLY_FIXED[p]?.[yr]||{};Object.values(yrD).forEach(m=>{irpf+=(m.Impuestos||0);CAT_B.forEach(c=>{b2+=(m[c]||0);});});});
    return (rot+irpf+b2)>0;
  });
  const chartData=chartYears.map(yr=>{
    const bkY=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr);
    const rot=bkY.reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
    let irpf=0,b2=0;
    ps.forEach(p=>{const yrD=MONTHLY_FIXED[p]?.[yr]||{};Object.values(yrD).forEach(m=>{irpf+=(m.Impuestos||0);CAT_B.forEach(c=>{b2+=(m[c]||0);});});});
    return{lbl:String(yr),val:rot+irpf+b2};
  });

  // Monthly table: months × Tipo B categories (from MONTHLY_FIXED)
  // Rows = each month with data, columns = Tipo B cats + Impuestos IRPF (Tipo A)
  const monthlyTableRows=useMemo(()=>{
    const yrs=year==="all"?[2022,2023,2024,2025,2026]:[+year];
    const rows=[];
    yrs.forEach(yr=>{
      for(let m=1;m<=12;m++){
        let hasAny=false;
        const rowData={yr,m,cats:{}};
        CAT_B.forEach(cat=>{
          let v=0;
          ps.forEach(p=>{v+=(MONTHLY_FIXED[p]?.[yr]?.[m]?.[cat]||0);});
          rowData.cats[cat]=v;
          if(v>0) hasAny=true;
        });
        // IRPF (Tipo A - shown separately)
        let irpf=0;
        ps.forEach(p=>{irpf+=(MONTHLY_FIXED[p]?.[yr]?.[m]?.Impuestos||0);});
        rowData.cats["Impuestos IRPF"]=irpf;
        if(irpf>0) hasAny=true;
        if(hasAny) rows.push(rowData);
      }
    });
    return rows;
  },[prop,year]);

  // Monthly totals by month (A+B) for "Mes con mayor gasto"
  const monthTotals=useMemo(()=>{
    const byM={};
    const yrs=year==="all"?[2022,2023,2024,2025,2026]:[+year];
    yrs.forEach(yr=>{
      for(let m=1;m<=12;m++){
        const key=`${yr}-${m}`;
        let tot=0;
        // Tipo B
        ps.forEach(p=>{const row=MONTHLY_FIXED[p]?.[yr]?.[m]||{};CAT_B.forEach(c=>{tot+=(row[c]||0);});tot+=(row.Impuestos||0);});
        // Rotación
        tot+=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr&&b[10]===m).reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
        if(tot>0) byM[key]={yr,m,tot};
      }
    });
    return byM;
  },[prop,year,activeBK]);

  const mesMayorGasto=useMemo(()=>{
    const entries=Object.values(monthTotals);
    if(!entries.length) return null;
    return entries.reduce((a,b)=>b.tot>a.tot?b:a);
  },[monthTotals]);

  // Add expense
  function saveExpense(){
    const a=parseFloat(form.amount);if(!a) return;
    const entry={id:Date.now(),prop:form.prop,year:+form.year,month:form.month?+form.month:null,cat:form.cat,amount:a};
    const ne=[...ex,entry];setEx(ne);lsSet("pt_ex",ne);
    callWebhook({action:"add_expense",prop:form.prop,year:+form.year,month:form.month,cat:form.cat,amount:a});
    showToast("Gasto añadido ✓",GRN_F);setAddModal(false);
    setForm({prop:prop==="all"?"LV":prop,year:"2026",month:"",cat:"Comunidad",amount:""});
  }
  function saveModRecurrent(){
    const a=parseFloat(modForm.amount);if(!a){showToast("Introduce un importe válido",RED_F);return;}
    showToast(`Cambio guardado: ${modForm.cat} → ${eur(a)}/mes desde ${MS[+modForm.fromMonth]} ${modForm.fromYear}`,GRN_F);
    callWebhook({action:"modify_recurring",cat:modForm.cat,prop:prop==="all"?"LV":prop,amount:a,fromYear:+modForm.fromYear,fromMonth:+modForm.fromMonth});
    setModModal(false);
  }

  // Download Excel — only selected year's data
  function dlExcel(){
    if(typeof XLSX==="undefined"){showToast("Librería XLSX no disponible",RED_F);return;}
    const selYrs=year==="all"?[2022,2023,2024,2025,2026]:[+year];
    const header=["Mes",...selYrs.map(String),"Total"];
    const rows=[header];
    // Tipo B rows
    CAT_B.forEach(cat=>{
      const row=[cat];let rowTotal=0;
      selYrs.forEach(yr=>{
        let v=0;ps.forEach(p=>{v+=(MONTHLY_FIXED[p]?.[yr]?.[1]?.[cat]||0);// sum across months
        Object.values(MONTHLY_FIXED[p]?.[yr]||{}).forEach(m=>{v+=(m[cat]||0);});v-=(MONTHLY_FIXED[p]?.[yr]?.[1]?.[cat]||0);// fix double-count
        });
        // recalculate correctly
        v=0;ps.forEach(p=>{Object.values(MONTHLY_FIXED[p]?.[yr]||{}).forEach(m=>{v+=(m[cat]||0);});});
        row.push(Math.round(v*100)/100);rowTotal+=v;
      });
      row.push(Math.round(rowTotal*100)/100);rows.push(row);
    });
    // Impuestos IRPF
    const irpfRow=["Impuestos IRPF"];let irpfTotal=0;
    selYrs.forEach(yr=>{let v=0;ps.forEach(p=>{Object.values(MONTHLY_FIXED[p]?.[yr]||{}).forEach(m=>{v+=(m.Impuestos||0);});});irpfRow.push(Math.round(v*100)/100);irpfTotal+=v;});
    irpfRow.push(Math.round(irpfTotal*100)/100);rows.push(irpfRow);
    // Rotación
    const rotRow=["Rotación"];let rotTotal=0;
    selYrs.forEach(yr=>{const v=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr).reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);rotRow.push(Math.round(v*100)/100);rotTotal+=v;});
    rotRow.push(Math.round(rotTotal*100)/100);rows.push(rotRow);
    // Total row
    const totRow=["TOTAL"];let grand=0;
    selYrs.forEach(yr=>{
      const bkY=activeBK.filter(b=>(prop==="all"||b[0]===prop)&&b[9]===yr);
      const rot=bkY.reduce((s,b)=>s+(b[0]==="LV"?OP.LV:OP.EL),0);
      let irpf=0,b2=0;
      ps.forEach(p=>{const yrD=MONTHLY_FIXED[p]?.[yr]||{};Object.values(yrD).forEach(m=>{irpf+=(m.Impuestos||0);CAT_B.forEach(c=>{b2+=(m[c]||0);});});});
      const v=rot+irpf+b2;totRow.push(Math.round(v*100)/100);grand+=v;
    });
    totRow.push(Math.round(grand*100)/100);rows.push(totRow);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:18},...selYrs.map(()=>({wch:12})),{wch:14}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Gastos");
    const nm=(prop==="all"?"Ambas":prop==="LV"?"LasVegas":"Elefantes");
    const periodo=year==="all"?"2022-2026":String(year);
    const buf=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;
    a.download=`Gastos_${nm}_${periodo}.xlsx`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast("Excel descargado ✓",GRN_F);
  }

  const hasAnyData=ps.some(p=>(year==="all"||+year>=2024||(p==="LV"&&+year>=2022)));
  if(!hasAnyData&&year!=="all") return <div style={{...c.card,padding:"24px 20px",marginTop:8}}><div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Sin datos para este período</div><div style={{fontSize:12.5,color:MUT}}>Los Elefantes fue adquirido en agosto 2024.</div></div>;

  const inputSt={width:"100%",background:"var(--sec)",border:`1px solid ${BD}`,borderRadius:7,padding:"7px 9px",color:"var(--txt)",fontSize:12.5,outline:"none"};
  const secdiv=(txt)=><div style={{fontSize:11,fontWeight:700,color:MUT,textTransform:"uppercase",letterSpacing:.7,marginBottom:6,marginTop:14}}>{txt}</div>;

  // Horizontal bar data by category (Tipo B then Tipo A, sorted by value within group)
  const tipoBEntries=CAT_B.map(cat=>([cat,catBTotals[cat]])).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const tipoAEntries=[["Rotación",tipoArot],["Impuestos IRPF",tipoAirpf]].filter(([,v])=>v>0);
  const maxHBarVal=Math.max(...tipoBEntries.map(([,v])=>v),...tipoAEntries.map(([,v])=>v),1);

  const colB={"IBI":"#60a5fa","Seguros":"#a78bfa","Comunidad":"#34d399","Agua":"#38bdf8","Luz":"#fbbf24","Derramas":"#f87171","Internet":"#fb923c","Alarma":"#e879f9"};
  const colA={"Rotación":"#94a3b8","Impuestos IRPF":"#f43f5e"};

  const HBar=({label,val,col})=>{
    const w=Math.max(1,(val/maxHBarVal*100));
    const pctOfTotal=totalGastos>0?(val/totalGastos*100):0;
    return <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
      <div style={{width:130,fontSize:12,color:TXT,flexShrink:0,textAlign:"right"}}>{label}</div>
      <div style={{flex:1,height:8,background:"var(--sec)",borderRadius:4,overflow:"hidden"}}>

function TabProx({prop,year,activeBK,cancelled,cancelBk,uncancelBk,chks,setChks}){
  const [filterStatus,setFilterStatus]=useState("all"); // all|proximas|activas|pasadas|canceladas
  const [filterPlat,setFilterPlat]=useState("all"); // all|A|B|P
  const [cancelConfirm,setCancelConfirm]=useState(null); // booking to confirm cancel

  const tog=(key,f,b)=>{
    const newVal=!(chks[key]||{})[f];
    setChks(prev=>{const nc={...prev,[key]:{...(prev[key]||{}),[f]:newVal}};lsSet("pt_chks",nc);return nc;});
    if(newVal&&b){const action=f==="pol"?"mark_policia":"mark_eka";
      if(action==="mark_eka"){
        callWebhook({action:"mark_eka",prop:b[0],checkin:b[4],checkin_fmt:fDate(b[4]),name:b[3]||b[2],sheet:b[0]==="LV"?"Las Vegas alquileres":"Elefantes alquileres",value:"Si"});
        showToast("Enviado a Eka ✓",TEAL_F);
      } else {
        callWebhook({action,prop:b[0],checkin:b[4]});
        showToast("Registrado en Policía ✓",GRN_F);
      }
    }
  };

  const isH=year!=="all"&&+year<TODAY.getFullYear();
  const rel=useMemo(()=>activeBK.filter(b=>(prop==="all"||b[0]===prop)&&(year==="all"||b[9]===+year)).sort((a,b)=>new Date(a[4])-new Date(b[4])),[prop,year,activeBK]);

  // Today's check-ins and check-outs
  const todayStr=TODAY.toISOString().slice(0,10);
  const todayCI=rel.filter(b=>b[4]===todayStr&&!cancelled[b[0]+b[4]+b[3]]);
  const todayCO=rel.filter(b=>b[5]===todayStr&&!cancelled[b[0]+b[4]+b[3]]);

  // Filtering
  const allBk=useMemo(()=>{
    let list=[...rel];
    if(filterPlat!=="all") list=list.filter(b=>b[1]===filterPlat);
    return list;
  },[rel,filterPlat]);

  const filteredBk=useMemo(()=>{
    if(filterStatus==="canceladas"){
      return (Object.keys(cancelled).length>0
        ?BK.filter(b=>(prop==="all"||b[0]===prop)&&(year==="all"||b[9]===+year)&&cancelled[b[0]+b[4]+b[3]])
        :[]);
    }
    let list=allBk;
    if(filterStatus==="proximas") list=list.filter(b=>du(b[4])>0&&!cancelled[b[0]+b[4]+b[3]]);
    else if(filterStatus==="activas") list=list.filter(b=>du(b[4])<=0&&du(b[5])>0&&!cancelled[b[0]+b[4]+b[3]]);
    else if(filterStatus==="pasadas") list=list.filter(b=>du(b[5])<=0&&!cancelled[b[0]+b[4]+b[3]]);
    return list;
  },[allBk,filterStatus,cancelled,prop,year]);

  const platColor=p=>p==="B"?"#60a5fa":p==="A"?"#f87171":"#a78bfa";
  const platLabel=p=>p==="B"?"Booking":p==="A"?"Airbnb":"Privado";

  function BRow({b,isCancelled}){
    const key=b[0]+b[4]+b[3];

const PUB_ID="2PACX-1vQM6TynOGUttUtAsekgEXzPxWd8Z8eAMwQfkr-MDCXxaTNTf7GqEfCyumkLHU39R-hf1jsQozUo8GAE";
const csvUrl=gid=>`https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${gid}&single=true&output=csv`;
function parseCSVLine(line){const res=[],re=/("(?:[^"]|"")*"|[^,]*),?/g;let m;while((m=re.exec(line))!==null){if(m.index===re.lastIndex){re.lastIndex++;break;}res.push(m[1].replace(/^"|"$/g,'').replace(/""/g,'"').trim());}return res;}
function parseCSV(txt){return txt.split(/\r?\n/).map(parseCSVLine);}
function isoDate(s){if(!s||!s.trim()) return '';const d=s.trim();if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){const[dd,mm,yy]=d.split('/');return `${yy}-${mm}-${dd}`;}if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;const n=parseFloat(d);if(!isNaN(n)&&n>40000){const dt=new Date((n-25569)*86400*1000);return dt.toISOString().slice(0,10);}return '';}
async function tryCSV(gid){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),10000);
  try{const r=await fetch(csvUrl(gid),{signal:ctrl.signal});clearTimeout(t);if(!r.ok) throw new Error(r.status);return r.text();}
  catch(e){clearTimeout(t);throw e;}
}
function parseBkSheet(csv,prop,cancelled){
  const rows=parseCSV(csv),bks=[],chkUpdates={};
  for(const r of rows){
    if((r[5]||'').trim().toLowerCase()!=='alquileres') continue;
    const plat=(r[6]||'').toLowerCase().includes('booking')?'B':(r[6]||'').toLowerCase().includes('airbnb')?'A':'P';
    const pais=prop==='LV'?(r[7]||''):(r[8]||''),nombre=prop==='LV'?(r[8]||''):(r[7]||'');
    const ci=isoDate(r[9]),co=isoDate(r[10]),mesN=parseInt(r[12])||0,año=parseInt(r[14])||0;
    function parseNum(s){s=String(s||'').trim().replace(/\s/g,'');if(!s||s==='-')return 0;if(s.includes(','))return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;return parseFloat(s.replace(/[^0-9.-]/g,''))||0;}
    const total=parseNum(r[21])||parseNum(r[15])||0,noches=parseInt(r[16])||0,pax=parseInt(r[17])||1;
    if(año>=2021&&total>0&&noches>0){
      const key=prop+ci+nombre.trim(); // clave incluye nombre para coincidir con UI
      if(cancelled&&cancelled[key]) continue; // omitir canceladas
      bks.push([prop,plat,pais.trim(),nombre.trim(),ci,co,noches,pax,total,año,mesN]);
      const ekaDone=(r[4]||'').toString().trim().toLowerCase()==='si';
      if(ekaDone) chkUpdates[key]={eka:true};
    }
  }
  return {bks, chkUpdates};
}
function whichSheet(csv){
  const rows=parseCSV(csv),br=rows.filter(r=>(r[5]||'').trim().toLowerCase()==='alquileres');
  if(br.length<2) return null;
  const yrs=br.map(r=>parseInt(r[14])).filter(y=>!isNaN(y)&&y>2000);
  if(!yrs.length) return null;
  const minY=Math.min(...yrs);
  if(minY<=2022) return 'LV';if(minY>=2024) return 'EL';return null;
}

function checkAndNotify(newBK, cancelled){

    const k="new_"+bkKey(b);

      const prop=b[0]==="LV"?"Las Vegas Golf":"Los Elefantes";
      const plat=b[1]==="B"?"Booking":b[1]==="A"?"Airbnb":"Privado";

      );
      sent[k]=now;
    }
  });
  // 3 días antes check-in
  newBK.filter(b=>!cancelled||!cancelled[bkKey(b)]).forEach(b=>{
    const d=du(b[4]);
    if(d>=1&&d<=3){
      const k="checkin3_"+bkKey(b);
      if(!sent[k]||now-sent[k]>864e5){
        const prop=b[0]==="LV"?"Las Vegas Golf":"Los Elefantes";
        sendEmailJS("Próxima entrada en "+prop+" el "+fDate(b[4]),"Recuerda enviar datos a la Policía.\n\nCheck-in: "+fDate(b[4])+"\nNoches: "+b[6]);
        sent[k]=now;
      }
    }
  });
  // Pago Eka pendiente
  const today=new Date(TODAY);
  const dayOfMonth=today.getDate();
  if(dayOfMonth>=28){
    const ekaData=lsGet("pt_eka",{});
    const pending=EKA.filter(r=>{const k=r[0]+"-"+r[1];return r[7]!=="Pagado"&&!ekaData[k]&&r[0]===today.getFullYear()&&r[1]===today.getMonth()+1;});
    if(pending.length>0){
      const k="eka_pending_"+today.getFullYear()+"_"+(today.getMonth()+1);
      if(!sent[k]||now-sent[k]>864e5){
        const total=pending.reduce((s,r)=>s+r[4]+r[6],0);
        sendEmailJS("Pago pendiente a Eka","Tienes pagos pendientes a Eka por "+eur(total)+".");
        sent[k]=now;
      }
    }
  }
  lsSet(sentKey, sent);
}

function TabImpuestos({activeBK}){
  // ALWAYS show both properties regardless of prop filter
  const propList=["LV","EL"];
  const propLabel=p=>p==="LV"?"Las Vegas Golf":"Los Elefantes";
  const propCol=p=>p==="LV"?GOLD:TEAL;

  // Calculate taxes: SUM(Beneficio of Airbnb+Booking, excl. Privado) × 0.24 per property per year
  const allYears=useMemo(()=>[...new Set((activeBK||[]).filter(b=>b[1]!=="P").map(b=>b[9]))].sort(),[activeBK]);

  const calcTax=useCallback((p,yr)=>{
    return (activeBK||[]).filter(b=>b[0]===p&&b[9]===yr&&b[1]!=="P").reduce((s,b)=>s+b[8],0)*0.24;
  },[activeBK]);

  const taxTable=useMemo(()=>{
    const out={};
    propList.forEach(p=>{
      out[p]={};
      allYears.forEach(yr=>{out[p][yr]=calcTax(p,yr);});
    });
    return out;
  },[activeBK,allYears]);

  const totalByProp=p=>allYears.reduce((s,yr)=>s+(taxTable[p]?.[yr]||0),0);
  const totalByYear=yr=>propList.reduce((s,p)=>s+(taxTable[p]?.[yr]||0),0);
  const grandTotal=propList.reduce((s,p)=>s+totalByProp(p),0);

  return <div>
    <div style={{fontSize:11.5,color:MUT,marginBottom:14,lineHeight:1.6}}>
      Vista consolidada de ambas propiedades. Cálculo: <b style={{color:TXT}}>SUM(ingresos Airbnb+Booking) × 24%</b> por propiedad y año. Se excluyen reservas privadas.
    </div>

    {/* KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}} className="mob-grid">
      <div style={c.card}>
        <div style={c.lbl}>Las Vegas Golf — total</div>
        <div style={{...c.big(GOLD),fontSize:20}}>{eur(Math.round(totalByProp("LV")))}</div>
